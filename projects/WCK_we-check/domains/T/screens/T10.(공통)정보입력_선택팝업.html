<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선택 팝업</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    i[data-icon] { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    html, body { width: 100%; min-width: 360px; height: 100%; font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif; background: var(--color-bg-white); color: var(--color-text-default); letter-spacing: var(--tracking-tight); overflow: hidden; }
    .screen { width: 100%; height: 100vh; position: relative; }
    .dim { position: absolute; inset: 0; background: var(--color-dim); z-index: 10; }
    .popup { position: absolute; top: 50%; left: var(--popup-margin); right: var(--popup-margin); transform: translateY(-50%); z-index: 20; background: var(--color-bg-white); border-radius: var(--radius-default); overflow: hidden; padding-bottom: var(--page-margin); }
    .popup-header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--page-margin); }
    .popup-title { font-size: var(--font-heading1); font-weight: var(--weight-medium); line-height: var(--lh-heading1); letter-spacing: var(--tracking-tight); color: var(--color-text-default); }
    .close-btn { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .popup-list { padding: 0 var(--page-margin); }
    .list-item { height: var(--input-height); display: flex; align-items: center; border-bottom: 1px solid var(--color-border-default); font-size: var(--font-body2); font-weight: var(--weight-regular); line-height: var(--lh-body2); letter-spacing: var(--tracking-tight); color: var(--color-text-default); cursor: pointer; }
    .list-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="dim"></div>
    <div class="popup">
      <div class="popup-header">
        <span class="popup-title">시도를 선택해 주세요</span>
        <span class="close-btn"><i data-icon="close" style="width:15px;height:15px;"></i></span>
      </div>
      <div class="popup-list">
        <div class="list-item">입찰, 계약용</div>
        <div class="list-item">수금용</div>
        <div class="list-item">관공서 제출용</div>
        <div class="list-item">대출용</div>
        <div class="list-item">여권 또는 비자 신청용</div>
        <div class="list-item">국민건강보험공단 제출용</div>
        <div class="list-item">금융기관 제출용</div>
      </div>
    </div>
  </div>
  <script src="../../../icons.js"></script>

  <script>
  /* scenario-index 연동: 활성 버튼 클릭 시 다음 화면으로 이동 */
  (function(){
    function tryNext(btn){
      if(!btn)return;
      if(btn.disabled)return;
      if(btn.classList.contains('btn-disabled'))return;
      var bg=btn.style.background||btn.style.backgroundColor||'';
      if(bg.indexOf('bg-disabled')!==-1)return;
      if(btn.style.cursor==='default')return;
      window.parent.postMessage('next','*');
    }
    document.addEventListener('click',function(e){
      var btn=e.target.closest('.bottom .btn,.bs-body .btn,.pbtn-right');
      if(btn)tryNext(btn);
      var item=e.target.closest('.list-item');
      if(item){
        var items=item.parentNode.querySelectorAll('.list-item');
        for(var i=0;i<items.length;i++){items[i].style.color='';items[i].style.fontWeight='';}
        item.style.color='var(--color-primary)';
        item.style.fontWeight='var(--weight-medium)';
        window.parent.postMessage('next','*');
      }
      var uploadBtn=e.target.closest('.upload-btn');
      if(uploadBtn){var ov=document.querySelector('.overlay');var sh=document.querySelector('.bottom-sheet');if(ov)ov.style.display='';if(sh)sh.style.display='';return;}
      var closeBtn=e.target.closest('.pbtn-left,.bs-header .h-btn,.close-btn,.dim');
      if(closeBtn){
        var dim=document.querySelector('.dim');
        var popup=document.querySelector('.popup');
        var noAlert=document.querySelector('.no-alert');
        if(dim)dim.style.display='none';
        if(popup)popup.style.display='none';
        if(noAlert)noAlert.style.display='none';
        var overlay=document.querySelector('.overlay');
        var sheet=document.querySelector('.bottom-sheet');
        if(overlay)overlay.style.display='none';
        if(sheet)sheet.style.display='none';
      }
    });
  })();
  </script></body>
</html>
