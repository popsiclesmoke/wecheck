<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기본 팝업 (투버튼)</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    i[data-icon] { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    html, body { width: 100%; min-width: 360px; height: 100%; font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif; background: var(--color-bg-white); color: var(--color-text-default); letter-spacing: var(--tracking-tight); overflow: hidden; }
    .screen { width: 100%; height: 100vh; position: relative; }
    .dim { position: absolute; inset: 0; background: var(--color-dim); z-index: 10; }
    .popup { position: absolute; top: 50%; left: var(--popup-margin); right: var(--popup-margin); transform: translateY(-50%); z-index: 20; background: var(--color-bg-white); border-radius: var(--radius-default); overflow: hidden; }
    .popup-body { padding: 23px var(--page-margin); min-height: 115px; display: flex; align-items: center; justify-content: center; }
    .popup-text { font-size: var(--font-body2); font-weight: var(--weight-regular); line-height: var(--lh-body2); letter-spacing: -0.56px; color: var(--color-text-default); text-align: center; }
    .popup-btns { display: flex; height: var(--button-popup-h); }
    .pbtn { flex: 1; border: none; cursor: pointer; font-size: var(--font-heading6); font-weight: var(--weight-medium); font-family: inherit; letter-spacing: -0.52px; display: flex; align-items: center; justify-content: center; }
    .pbtn-left { background: var(--color-bg-disabled); color: var(--color-text-default); border-radius: 0 0 0 var(--radius-default); }
    .pbtn-right { background: var(--color-primary); color: var(--color-text-white); border-radius: 0 0 var(--radius-default) 0; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="dim"></div>
    <div class="popup">
      <div class="popup-body">
        <p class="popup-text">인증서 앱에서 인증 완료 후<br>[인증 완료] 버튼을 클릭해 주세요</p>
      </div>
      <div class="popup-btns">
        <button class="pbtn pbtn-left">닫기</button>
        <button class="pbtn pbtn-right">인증서 재선택</button>
      </div>
    </div>
  </div>

  <script src="../../../icons.js"></script>
  <script>
  /* scenario-index 연동: 활성 버튼 클릭 시 다음 화면으로 이동 */
  (function(){
    function tryNext(btn){
      if(!btn)return;
      if(btn.disabled)return;
      if(btn.classList.contains('btn-disabled'))return;
      var bg=btn.style.background||btn.style.backgroundColor||'';
      if(bg.indexOf('bg-disabled')!==-1)return;
      if(btn.style.cursor==='default')return;
      window.parent.postMessage('next','*');
    }
    document.addEventListener('click',function(e){
      var btn=e.target.closest('.bottom .btn,.bs-body .btn,.pbtn-right');
      if(btn)tryNext(btn);
      var uploadBtn=e.target.closest('.upload-btn');
      if(uploadBtn){var ov=document.querySelector('.overlay');var sh=document.querySelector('.bottom-sheet');if(ov)ov.style.display='';if(sh)sh.style.display='';return;}
      var closeBtn=e.target.closest('.pbtn-left,.bs-header .h-btn');
      if(closeBtn){
        var dim=document.querySelector('.dim');
        var popup=document.querySelector('.popup');
        var noAlert=document.querySelector('.no-alert');
        if(dim)dim.style.display='none';
        if(popup)popup.style.display='none';
        if(noAlert)noAlert.style.display='none';
        var overlay=document.querySelector('.overlay');
        var sheet=document.querySelector('.bottom-sheet');
        if(overlay)overlay.style.display='none';
        if(sheet)sheet.style.display='none';
      }
    });
  })();
  </script></body>
</html>
