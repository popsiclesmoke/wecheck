<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인증 수단 선택 (1열)</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    i[data-icon] { display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    html, body { width: 100%; height: 100%; font-family: 'Noto Sans KR', -apple-system, 'Apple SD Gothic Neo', sans-serif; background: var(--color-bg-white); color: var(--color-text-default); letter-spacing: var(--tracking-tight); overflow: hidden; }
    .screen { width: 100%; height: 100vh; display: flex; flex-direction: column; }

    /* StatusBar */
    
    .statusbar { height: var(--statusbar-height); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--color-bg-white); }
    .statusbar svg { display: block; }
    .statusbar .time { font-size: var(--font-body2); font-weight: var(--weight-semibold); color: #222222; }
    .statusbar .indicators { display: flex; align-items: center; gap: var(--space-xs); }
    .statusbar .indicators span { display: inline-block; background: #222222; border-radius: 2px; }
    .sig-bar { width: 17px; height: 11px; clip-path: polygon(0 70%,20% 70%,20% 100%,0 100%,0 70%,30% 45%,50% 45%,50% 100%,30% 100%,60% 25%,80% 25%,80% 100%,90% 0,100% 0,100% 100%); }
    .wifi { width: 16px; height: 11px; }
    .batt { width: 22px; height: 11px; border-radius: 2px; }

    /* Header */
    .header { height: var(--header-height); flex-shrink: 0; display: flex; align-items: center; padding: 0 var(--page-margin); background: var(--color-bg-white); position: relative; }
    .logo { position: absolute; left: 50%; transform: translateX(-50%); font-size: var(--font-heading1); font-weight: var(--weight-logo); color: var(--color-primary); white-space: nowrap; }
    .h-btn { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* Content */
    .content { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 var(--page-margin); }

    /* Step area */
    .step-area { padding: var(--space-page-top) 0 var(--space-xxl); display: flex; flex-direction: column; gap: var(--space-xxl); }
    .step-row { display: flex; align-items: center; gap: 15px; }
    .step-icon { position: relative; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-icon i { position: absolute; inset: 0; display: block; }
    .step-num { position: relative; z-index: 1; font-size: 10px; font-weight: var(--weight-regular); color: var(--color-text-default); line-height: 1; letter-spacing: -0.4px; }
    .step-title { font-size: var(--font-heading1); font-weight: var(--weight-medium); color: var(--color-text-default); letter-spacing: -0.76px; white-space: nowrap; }
    .step-desc { font-size: var(--font-body2); font-weight: var(--weight-regular); color: var(--color-text-default); line-height: 21px; letter-spacing: -0.56px; }
    .step-desc .blue { color: var(--color-primary); font-weight: var(--weight-medium); }

    /* 1열 인증서 목록 */
    .cert-list { display: flex; flex-direction: column; gap: var(--space-md); padding-bottom: var(--page-margin); }

    /* 인증서 카드 (1열 — 320×90) */
    .cert-card {
      display: flex; align-items: center; gap: 15px;
      padding: var(--space-xxl) 13px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-default);
      cursor: pointer; width: 100%;
      transition: border-color 0.15s;
    }
    .cert-card:active { opacity: 0.8; }
    .cert-card.selected { border: 2px solid var(--color-primary); padding: calc(var(--space-xxl) - 1px) 12px; }
    .cert-icon { width: 50px; height: 50px; border-radius: var(--radius-default); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .cert-icon img { width: 100%; height: 100%; object-fit: cover; }
    .cert-icon.with-border { border: 1px solid var(--color-border-default); border-radius: 16px; }
    .cert-name { font-size: var(--font-body2); font-weight: var(--weight-medium); color: var(--color-text-org); line-height: var(--lh-body2); }

    /* Bottom */
    .bottom { flex-shrink: 0; padding: 0 var(--page-margin) var(--page-margin); }
    .btn { width: var(--component-width); height: var(--button-height); border-radius: var(--radius-default); border: none; cursor: pointer; font-size: var(--font-heading4); font-weight: var(--weight-medium); display: flex; align-items: center; justify-content: center; letter-spacing: var(--tracking-tight); font-family: inherit; }
    .btn-primary { background: var(--color-primary); color: var(--color-text-white); }
  </style>
</head>
<body>

    <div class="statusbar">

</div>
    <div class="header">
      <div class="h-btn"><i data-icon="arrowBack"></i></div>
      <img class="logo" src="../../../design/ci%20png/WeCheck.png" alt="WeCheck" style="height:16px; width:auto;">
    </div>
    <div class="content">
      <div class="step-area">
        <div class="step-row">
          <div class="step-icon">
            <i data-icon="chart" data-size="36"></i>
            <span class="step-num">4/5</span>
          </div>
          <span class="step-title">인증 수단 선택</span>
        </div>
        <p class="step-desc">
          증명서 조회를 위해 <span class="blue">총 3번</span>의 인증을 진행합니다<br>
          인증 수단을 선택해 주세요
        </p>
      </div>

      <!-- 1열 인증서 카드 (9개) -->
      <div class="cert-list">
        <div class="cert-card selected" onclick="selectCert(this)">
          <div class="cert-icon with-border"><img src="../../../design/icons/illust/phone.svg" style="width:26px;height:32px;" alt="휴대폰인증"></div>
          <span class="cert-name">휴대폰인증</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/kb.png" alt="KB모바일 인증서"></div>
          <span class="cert-name">KB모바일 인증서</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/카카오톡.png" alt="카카오톡"></div>
          <span class="cert-name">카카오톡</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/신한.png" alt="신한인증서"></div>
          <span class="cert-name">신한인증서</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/삼성.png" alt="삼성패스"></div>
          <span class="cert-name">삼성패스</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/패스.png" alt="통신사패스"></div>
          <span class="cert-name">통신사패스</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/토스.png" alt="토스"></div>
          <span class="cert-name">토스</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon with-border"><img src="../../../design/ci png/payco.png" alt="페이코"></div>
          <span class="cert-name">페이코</span>
        </div>
        <div class="cert-card" onclick="selectCert(this)">
          <div class="cert-icon"><img src="../../../design/ci png/네이버.png" alt="네이버"></div>
          <span class="cert-name">네이버</span>
        </div>
      </div>
    </div>
    <div class="bottom">
      <button class="btn btn-primary">선택 완료</button>
    </div>
  </div>
  <script src="../../../icons.js"></script>
  <script>
    function selectCert(el) {
      document.querySelectorAll('.cert-card').forEach(function(c) {
        c.classList.remove('selected');
        c.style.padding = '';
      });
      el.classList.add('selected');
    }
  </script>

  <script>
  /* scenario-index 연동: 활성 버튼 클릭 시 다음 화면으로 이동 */
  (function(){
    function tryNext(btn){
      if(!btn)return;
      if(btn.disabled)return;
      if(btn.classList.contains('btn-disabled'))return;
      var bg=btn.style.background||btn.style.backgroundColor||'';
      if(bg.indexOf('bg-disabled')!==-1)return;
      if(btn.style.cursor==='default')return;
      window.parent.postMessage('next','*');
    }
    document.addEventListener('click',function(e){
      var btn=e.target.closest('.bottom .btn,.bs-body .btn,.pbtn-right');
      if(btn)tryNext(btn);
      var uploadBtn=e.target.closest('.upload-btn');
      if(uploadBtn){var ov=document.querySelector('.overlay');var sh=document.querySelector('.bottom-sheet');if(ov)ov.style.display='';if(sh)sh.style.display='';return;}
      var closeBtn=e.target.closest('.pbtn-left,.bs-header .h-btn');
      if(closeBtn){
        var dim=document.querySelector('.dim');
        var popup=document.querySelector('.popup');
        var noAlert=document.querySelector('.no-alert');
        if(dim)dim.style.display='none';
        if(popup)popup.style.display='none';
        if(noAlert)noAlert.style.display='none';
        var overlay=document.querySelector('.overlay');
        var sheet=document.querySelector('.bottom-sheet');
        if(overlay)overlay.style.display='none';
        if(sheet)sheet.style.display='none';
      }
    });
  })();
  </script></body>
</html>
