<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>Korbit 연결</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-korbit-from: #FF8A00;
      --color-korbit-to: #FF6B00;
      --display-font-size: 40px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 32px 16px 24px; display: flex; flex-direction: column; align-items: center; }

    .korbit-logo-wrap {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-korbit-from), var(--color-korbit-to));
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0px 8px 24px color-mix(in srgb, var(--color-korbit-to) 25%, transparent);
    }
    .korbit-letter {
      font-size: var(--display-font-size); font-weight: 800;
      color: var(--color-bg);
      font-family: 'Arial', sans-serif;
      line-height: 1;
    }

    .connect-desc {
      text-align: center;
      font-size: var(--text-body-lg-size);
      font-weight: var(--text-body-lg-weight);
      color: var(--color-text-body);
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .connect-desc strong {
      color: var(--color-text-heading);
      font-weight: 600;
    }

    .steps-title {
      width: 100%;
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-description);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .steps-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .step-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-lg);
    }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-primary);
      color: var(--color-bg);
      font-size: var(--text-body-xs-size); font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step-text { font-size: var(--text-body-sm-size); font-weight: 400; color: var(--color-text-title); line-height: 1.4; }
    .step-text strong { font-weight: 600; color: var(--color-text-heading); }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">Korbit 연결</span>
  </div>

  <div class="content">
    <div class="korbit-logo-wrap">
      <span class="korbit-letter">K</span>
    </div>

    <p class="connect-desc">
      <strong>Korbit 계정과 연결</strong>하면<br>
      보유 코인을 간편하게 충전할 수 있어요
    </p>

    <div class="steps-title">연결 절차</div>
    <div class="steps-list">
      <div class="step-item">
        <div class="step-num">1</div>
        <div class="step-text"><strong>QR 스캔</strong><br>Korbit 앱에서 QR코드를 스캔하세요</div>
      </div>
      <div class="step-item">
        <div class="step-num">2</div>
        <div class="step-text"><strong>권한 허용</strong><br>출금 권한 요청을 허용해 주세요</div>
      </div>
      <div class="step-item">
        <div class="step-num">3</div>
        <div class="step-text"><strong>연결 완료</strong><br>계정이 연결되면 코인 선택 화면으로 이동합니다</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">Korbit 연결하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
