<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>코인 선택</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-pci-from: #7B61FF;
      --color-pci-to: #5B3DF5;
      --color-btc-from: #F7A600;
      --color-btc-to: #F27B00;
      --color-eth-from: #627EEA;
      --color-eth-to: #3C5DE0;
      --color-xrp-from: #00AAE4;
      --color-xrp-to: #0088CC;
      --color-usdt-from: #26A17B;
      --color-usdt-to: #1A8B6A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 16px 0; }

    .section-label {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .coin-list { display: flex; flex-direction: column; }
    .coin-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--color-border-card);
      transition: background 0.1s;
    }
    .coin-item:last-child { border-bottom: none; }
    .coin-item:hover { background: var(--color-bg-content-2); }
    .coin-item.selected { background: var(--color-blue-50); }

    .coin-icon {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-lg-size); font-weight: 800;
      flex-shrink: 0; color: var(--color-bg);
    }
    .coin-pci  { background: linear-gradient(135deg, var(--color-pci-from), var(--color-pci-to)); }
    .coin-btc  { background: linear-gradient(135deg, var(--color-btc-from), var(--color-btc-to)); }
    .coin-eth  { background: linear-gradient(135deg, var(--color-eth-from), var(--color-eth-to)); }
    .coin-xrp  { background: linear-gradient(135deg, var(--color-xrp-from), var(--color-xrp-to)); }
    .coin-usdt { background: linear-gradient(135deg, var(--color-usdt-from), var(--color-usdt-to)); }

    .coin-info { flex: 1; }
    .coin-name { font-size: var(--text-title-sm-size); font-weight: var(--text-title-sm-weight); color: var(--color-text-heading); }
    .coin-fullname { font-size: var(--text-body-xs-size); color: var(--color-text-description); margin-top: 2px; }

    .coin-amounts { text-align: right; }
    .coin-balance { font-size: var(--text-body-sm-size); font-weight: 500; color: var(--color-text-title); }
    .coin-krw { font-size: var(--text-body-xs-size); color: var(--color-text-description); margin-top: 3px; }

    .radio-dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.15s;
    }
    .coin-item.selected .radio-dot {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .radio-inner {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-bg);
      opacity: 0;
    }
    .coin-item.selected .radio-inner { opacity: 1; }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">코인 선택</span>
  </div>

  <div class="content">
    <div class="section-label">보유 코인 목록</div>
    <div class="coin-list">
      <div class="coin-item" onclick="selectCoin(this)">
        <div class="radio-dot"><div class="radio-inner"></div></div>
        <div class="coin-icon coin-pci">P</div>
        <div class="coin-info">
          <div class="coin-name">PCI</div>
          <div class="coin-fullname">PCI Coin</div>
        </div>
        <div class="coin-amounts">
          <div class="coin-balance">1,250 PCI</div>
          <div class="coin-krw">≈ ₩62,500</div>
        </div>
      </div>

      <div class="coin-item selected" onclick="selectCoin(this)">
        <div class="radio-dot"><div class="radio-inner"></div></div>
        <div class="coin-icon coin-btc">₿</div>
        <div class="coin-info">
          <div class="coin-name">BTC</div>
          <div class="coin-fullname">Bitcoin</div>
        </div>
        <div class="coin-amounts">
          <div class="coin-balance">0.00153 BTC</div>
          <div class="coin-krw">≈ ₩125,000</div>
        </div>
      </div>

      <div class="coin-item" onclick="selectCoin(this)">
        <div class="radio-dot"><div class="radio-inner"></div></div>
        <div class="coin-icon coin-eth">Ξ</div>
        <div class="coin-info">
          <div class="coin-name">ETH</div>
          <div class="coin-fullname">Ethereum</div>
        </div>
        <div class="coin-amounts">
          <div class="coin-balance">0.0825 ETH</div>
          <div class="coin-krw">≈ ₩330,000</div>
        </div>
      </div>

      <div class="coin-item" onclick="selectCoin(this)">
        <div class="radio-dot"><div class="radio-inner"></div></div>
        <div class="coin-icon coin-xrp">X</div>
        <div class="coin-info">
          <div class="coin-name">XRP</div>
          <div class="coin-fullname">Ripple</div>
        </div>
        <div class="coin-amounts">
          <div class="coin-balance">520 XRP</div>
          <div class="coin-krw">≈ ₩78,000</div>
        </div>
      </div>

      <div class="coin-item" onclick="selectCoin(this)">
        <div class="radio-dot"><div class="radio-inner"></div></div>
        <div class="coin-icon coin-usdt">T</div>
        <div class="coin-info">
          <div class="coin-name">USDT</div>
          <div class="coin-fullname">Tether USD</div>
        </div>
        <div class="coin-amounts">
          <div class="coin-balance">85.50 USDT</div>
          <div class="coin-krw">≈ ₩114,000</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">선택 완료</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    function selectCoin(el) {
      document.querySelectorAll('.coin-item').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
  </script>
</body>
</html>
