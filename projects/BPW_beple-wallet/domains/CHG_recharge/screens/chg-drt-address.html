<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>수신 주소</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-danger-bg: #FFF5F5;
      --color-qr-module: var(--color-gray-800);
      --color-copy-btn-fill: var(--color-primary);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 20px 16px 16px; display: flex; flex-direction: column; align-items: center; }

    /* Badge pills row */
    .badge-row {
      display: flex; gap: 8px; margin-bottom: 20px; width: 100%; justify-content: center;
    }
    .badge-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: var(--text-body-xs-size);
      font-weight: 600;
    }
    .badge-coin { background: var(--color-blue-100); color: var(--color-primary); }
    .badge-net  { background: var(--color-bg-content-1); color: var(--color-text-title); }

    /* QR placeholder */
    .qr-container {
      width: 188px; height: 188px;
      border: 2px solid var(--color-border-divider);
      border-radius: var(--radius-lg);
      background: var(--color-bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    /* Corner decorations */
    .qr-corner {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--color-primary);
      border-style: solid;
      border-width: 0;
    }
    .qr-corner.tl { top: 8px; left: 8px; border-top-width: 3px; border-left-width: 3px; border-radius: 3px 0 0 0; }
    .qr-corner.tr { top: 8px; right: 8px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 3px 0 0; }
    .qr-corner.bl { bottom: 8px; left: 8px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 3px; }
    .qr-corner.br { bottom: 8px; right: 8px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 3px 0; }

    /* QR pattern (SVG mockup) */
    .qr-svg { width: 148px; height: 148px; opacity: 0.7; color: var(--color-qr-module); }
    .qr-center-logo {
      position: absolute;
      width: 32px; height: 32px; border-radius: 6px;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: var(--color-bg);
    }

    /* Address row */
    .address-section { width: 100%; margin-bottom: 16px; }
    .address-label {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      margin-bottom: 8px;
      text-align: center;
    }
    .address-row {
      display: flex; align-items: center;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      gap: 10px;
    }
    .address-text {
      flex: 1;
      font-size: var(--text-body-xs-size);
      font-family: 'Courier New', monospace;
      color: var(--color-text-title);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      height: var(--btn-sm-height);
      padding: 0 12px;
      background: var(--color-primary);
      color: var(--color-white);
      border: none; border-radius: var(--radius-md);
      font-size: var(--text-body-xs-size); font-weight: 600;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
    }

    /* Warning card */
    .warning-card {
      width: 100%;
      background: var(--color-danger-bg);
      border: 1px solid var(--color-red-200);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      display: flex; gap: 8px; align-items: flex-start;
      margin-bottom: 16px;
    }
    .warning-icon { font-size: 16px; flex-shrink: 0; }
    .warning-text {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-body);
      line-height: 1.6;
    }
    .warning-text strong { color: var(--color-error); font-weight: 600; }

    .expire-note {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      text-align: center;
    }
    .expire-note span { color: var(--color-warning); font-weight: 600; }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>

    <div class="address-section">

  <div class="footer">
    <button class="btn-primary">전송 완료, 확인하기</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    function copyAddress() {
      const addr = document.getElementById('addrText').textContent;
      navigator.clipboard.writeText(addr).catch(() => {});
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '완료!';
      setTimeout(() => { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="3.5" y="0.5" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="0.5" y="3.5" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.2" style="fill: color-mix(in srgb, var(--color-primary) 80%, transparent)"/></svg> 복사'; }, 1500);
    }
  </script>

</html>
