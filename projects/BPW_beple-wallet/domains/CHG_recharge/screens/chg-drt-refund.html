<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>환불주소 등록</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-warning-bg: #FFFBEA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 28px 16px 24px; }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .page-sub {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .warning-card {
      background: var(--color-warning-bg);
      border: 1.5px solid var(--color-yellow-200);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 28px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .warning-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
    .warning-text {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-body);
      line-height: 1.6;
    }
    .warning-text strong {
      font-weight: 600;
      color: var(--color-text-heading);
    }

    .input-label {
      font-size: var(--input-label-font-size);
      font-weight: 600;
      color: var(--color-text-description);
      margin-bottom: 8px;
    }

    .input-wrap {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--color-border-input);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--color-bg);
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--color-primary); }

    .address-input {
      flex: 1;
      height: var(--input-height);
      border: none; outline: none;
      font-size: var(--input-placeholder-size-box);
      color: var(--color-text-heading);
      padding: 0 14px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: transparent;
    }
    .address-input::placeholder { color: var(--color-text-disabled); }

    .qr-scan-btn {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; border-left: 1px solid var(--color-border-card);
      cursor: pointer; color: var(--color-text-description);
      transition: background 0.1s;
    }
    .qr-scan-btn:hover { background: var(--color-bg-content-2); color: var(--color-primary); }

    .paste-btn {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px;
      height: var(--btn-sm-height);
      padding: 0 var(--btn-sm-padding-x);
      background: none; border: 1px solid var(--color-border-card);
      border-radius: var(--radius-md);
      font-size: var(--btn-sm-font-size);
      color: var(--color-text-body);
      cursor: pointer;
    }
    .paste-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

    .network-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--color-blue-100);
      color: var(--color-primary);
      border-radius: var(--radius-sm);
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      padding: 4px 10px;
      margin-top: 20px;
    }
    .info-note {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      margin-top: 8px;
      line-height: 1.5;
    }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">환불주소 등록</span>
  </div>

  <div class="content">
    <p class="page-title">환불받을 지갑 주소를<br>입력해주세요</p>
    <p class="page-sub">전송 실패 또는 취소 시 이 주소로 반환됩니다</p>

    <div class="warning-card">
      <span class="warning-icon">&#x26A0;&#xFE0F;</span>
      <div class="warning-text">
        <strong>주의:</strong> 전송 실패 시 이 주소로 반환됩니다.<br>
        잘못된 주소 입력 시 자산을 복구할 수 없습니다.<br>반드시 <strong>USDT ERC-20</strong>을 지원하는 주소를 입력하세요.
      </div>
    </div>

    <div class="input-label">외부 지갑 주소</div>
    <div class="input-wrap">
      <input
        class="address-input"
        type="text"
        placeholder="0x로 시작하는 지갑 주소 입력"
        id="addressInput"
      />
      <button class="qr-scan-btn" aria-label="QR 스캔">
        <span data-icon="qrCode" style="width:22px;height:22px;display:inline-flex"></span>
      </button>
    </div>
    <button class="paste-btn">
      <span data-icon="copyLg" style="width:14px;height:14px;display:inline-flex"></span>
      클립보드에서 붙여넣기
    </button>

    <div>
      <span class="network-badge">
        <span data-icon="clock" style="width:12px;height:12px;display:inline-flex"></span>
        USDT · ERC-20
      </span>
    </div>
    <div class="info-note">선택하신 코인과 네트워크에 맞는 주소를 입력해 주세요</div>
  </div>

  <div class="footer">
    <button class="btn-primary">등록하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
