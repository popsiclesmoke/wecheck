<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>수량 입력</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }

    .amount-section {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px 16px;
    }

    .balance-row {
      display: flex; align-items: center; gap: 10px;
      width: 100%; justify-content: center;
      margin-bottom: 36px;
    }
    .balance-text {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
    }
    .balance-value {
      font-size: var(--text-body-sm-size);
      font-weight: 600;
      color: var(--color-text-title);
    }
    .btn-all {
      height: var(--btn-sm-height);
      padding: 0 var(--btn-sm-padding-x);
      background: var(--color-blue-100);
      color: var(--color-primary);
      border: none; border-radius: var(--radius-md);
      font-size: var(--btn-sm-font-size); font-weight: 600;
      cursor: pointer;
    }

    .amount-display {
      display: flex; align-items: flex-end; gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .amount-number {
      font-size: 52px; font-weight: 700;
      color: var(--color-text-heading);
      line-height: 1;
      min-width: 60px; text-align: right;
      letter-spacing: -0.02em;
    }
    .amount-number.zero { color: var(--color-text-disabled); }
    .amount-unit {
      font-size: var(--text-title-lg-size);
      font-weight: 600;
      color: var(--color-text-description);
      padding-bottom: 6px;
    }

    .amount-krw {
      font-size: var(--text-body-lg-size);
      color: var(--color-text-description);
      text-align: center;
      margin-bottom: 24px;
    }

    .divider { width: 100%; height: 1px; background: var(--color-border-card); margin-bottom: 20px; }

    /* Number Keypad */
    .keypad {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .key {
      height: 56px;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-title-lg-size);
      font-weight: 600;
      color: var(--color-text-heading);
      background: none; border: none;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: background 0.1s;
    }
    .key:active, .key:hover { background: var(--color-bg-content-1); }
    .key-backspace { font-size: 20px; color: var(--color-text-body); }
    .key-dot { font-size: 24px; }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">BTC 매도</span>
  </div>

  <div class="amount-section">
    <div class="balance-row">
      <span class="balance-text">보유</span>
      <span class="balance-value">0.00153 BTC</span>
      <button class="btn-all" onclick="setAll()">전체</button>
    </div>

    <div class="amount-display">
      <span class="amount-number zero" id="amountDisplay">0</span>
      <span class="amount-unit">BTC</span>
    </div>
    <div class="amount-krw" id="krwDisplay">≈ ₩0</div>

    <div class="divider"></div>

    <div class="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key key-dot" onclick="pressKey('.')">.</button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key key-backspace" onclick="pressBack()">
        <span data-icon="arrowLeftLong" style="width:24px;height:24px;display:inline-flex"></span>
      </button>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">다음</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    let current = '0';
    const BTC_PRICE = 81699346;

    function update() {
      const el = document.getElementById('amountDisplay');
      const krwEl = document.getElementById('krwDisplay');
      el.textContent = current;
      el.classList.toggle('zero', current === '0');
      const val = parseFloat(current) || 0;
      const krw = Math.floor(val * BTC_PRICE);
      krwEl.textContent = '≈ ₩' + krw.toLocaleString('ko-KR');
    }

    function pressKey(k) {
      if (k === '.' && current.includes('.')) return;
      if (current === '0' && k !== '.') current = k;
      else current += k;
      update();
    }

    function pressBack() {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      update();
    }

    function setAll() {
      current = '0.00153';
      update();
    }
  </script>
</body>
</html>
