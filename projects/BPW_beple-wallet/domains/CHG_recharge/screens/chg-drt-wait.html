<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>블록체인 대기</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .content {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* Spinner */
    .spinner-wrap {
      position: relative;
      width: 88px; height: 88px;
      margin-bottom: var(--state-gap-icon-msg);
    }
    .spinner-ring {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 5px solid var(--color-border-card);
      border-top-color: var(--color-primary);
      animation: spin 1.1s linear infinite;
      position: absolute; top: 0; left: 0;
    }
    .spinner-ring-2 {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-bottom-color: var(--color-blue-300);
      animation: spin 1.7s linear infinite reverse;
      position: absolute;
      top: 9px; left: 9px;
    }
    .spinner-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      background: var(--color-bg-content-2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-title-md-size);
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 10px;
    }
    .page-sub {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* Block progress */
    .block-progress {
      width: 100%;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 32px;
    }
    .progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .progress-label {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-title);
    }
    .progress-count {
      font-size: var(--text-title-xs-size);
      font-weight: 700;
      color: var(--color-primary);
    }

    .progress-bar-track {
      height: 8px;
      background: var(--color-border-card);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar-fill {
      height: 100%;
      width: 33.3%;
      background: linear-gradient(90deg, var(--color-blue-400), var(--color-primary));
      border-radius: 99px;
      animation: progressPulse 2s ease-in-out infinite;
    }
    @keyframes progressPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.75; }
    }

    .block-dots { display: flex; gap: 8px; justify-content: center; }
    .block-dot {
      width: 28px; height: 28px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-xs-size); font-weight: 700;
    }
    .dot-done { background: var(--color-primary); color: var(--color-bg); }
    .dot-pending {
      background: var(--color-border-card);
      color: var(--color-text-disabled);
    }
    .dot-pending.active {
      border: 2px solid var(--color-primary);
      color: var(--color-primary);
      animation: dotBlink 1s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .time-estimate {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 0;
    }
    .time-estimate strong { color: var(--color-text-title); font-weight: 600; }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-secondary {
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-bg-content-2);
      color: var(--color-text-heading);
      border: 1px solid var(--color-border-card);
      border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="spinner-wrap">
      <div class="spinner-ring"></div>
      <div class="spinner-ring-2"></div>
      <div class="spinner-center">&#x26D3;&#xFE0F;</div>
    </div>

    <p class="page-title">블록체인 확인 중입니다</p>
    <p class="page-sub">트랜잭션이 블록체인에서 확인되고 있습니다.<br>최대 30분이 소요될 수 있습니다.</p>

    <div class="block-progress">
      <div class="progress-header">
        <span class="progress-label">블록 확인 진행</span>
        <span class="progress-count">1 / 3 완료</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill"></div>
      </div>
      <div class="block-dots">
        <div class="block-dot dot-done">&#x2713;</div>
        <div class="block-dot dot-pending active">2</div>
        <div class="block-dot dot-pending">3</div>
      </div>
    </div>

    <div class="time-estimate">예상 완료 시간: <strong>약 10~20분</strong></div>
  </div>

  <div class="footer">
    <button class="btn-secondary">홈으로</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
