<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>충전 방법 선택</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-korbit: #FF6B00;
      --color-korbit-bg: #FFF3E0;
      --color-bank-green: #2E7D32;
      --color-bank-bg: #E8F5E9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
      background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 28px 16px 24px; }
    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 28px;
      line-height: 1.35;
    }
    .method-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 20px;
      border: 1.5px solid var(--color-border-card);
      border-radius: var(--radius-2xl);
      margin-bottom: 12px;
      cursor: pointer;
      background: var(--color-bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      min-height: 88px;
    }
    .method-card:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-card);
    }
    .method-card.selected {
      border-color: var(--color-primary);
      background: var(--color-blue-50);
    }
    .method-icon {
      width: 52px; height: 52px;
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: var(--text-headline-size);
    }
    .icon-korbit { background: var(--color-korbit-bg); color: var(--color-korbit); }
    .icon-wallet { background: var(--color-blue-100); color: var(--color-primary); }
    .icon-bank   { background: var(--color-bank-bg); color: var(--color-bank-green); }
    .method-info { flex: 1; }
    .method-name {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      margin-bottom: 5px;
    }
    .method-desc {
      font-size: var(--text-body-sm-size);
      font-weight: var(--text-body-sm-weight);
      color: var(--color-text-description);
      line-height: 1.4;
    }
    .method-arrow {
      color: var(--color-text-disabled);
      font-size: var(--text-title-md-size);
      flex-shrink: 0;
    }
    .badge {
      display: inline-block;
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      color: var(--color-primary);
      background: var(--color-blue-100);
      border-radius: var(--radius-sm);
      padding: 2px 7px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">충전하기</span>
  </div>

  <div class="content">
    <p class="page-title">어떤 방법으로<br>충전하시겠어요?</p>

    <div class="method-card selected" onclick="selectMethod(this)">
      <div class="method-icon icon-korbit">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" style="fill: var(--color-korbit)" opacity="0.15"/>
          <text x="14" y="19" text-anchor="middle" font-size="16" font-weight="700" style="fill: var(--color-korbit)" font-family="Arial">K</text>
        </svg>
      </div>
      <div class="method-info">
        <div class="method-name">Korbit 코인 매도</div>
        <div class="method-desc">보유 코인을 원화로 전환해 충전</div>
        <span class="badge">빠른 충전</span>
      </div>
      <span class="method-arrow">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <div class="method-card" onclick="selectMethod(this)">
      <div class="method-icon icon-wallet">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" style="fill: var(--color-primary)" opacity="0.12"/>
          <rect x="5" y="9" width="18" height="12" rx="2.5" style="stroke: var(--color-primary)" stroke-width="1.6" fill="none"/>
          <path d="M5 12h18" style="stroke: var(--color-primary)" stroke-width="1.6"/>
          <circle cx="19" cy="15.5" r="1.5" style="fill: var(--color-primary)"/>
        </svg>
      </div>
      <div class="method-info">
        <div class="method-name">외부지갑 직전송</div>
        <div class="method-desc">USDT/USDC를 외부 지갑에서 직접 전송</div>
      </div>
      <span class="method-arrow">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <div class="method-card" onclick="selectMethod(this)">
      <div class="method-icon icon-bank">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" style="fill: var(--color-bank-green)" opacity="0.12"/>
          <path d="M14 5l9 4.5H5L14 5z" style="stroke: var(--color-bank-green)" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
          <rect x="7" y="12" width="3" height="6" style="fill: var(--color-bank-green)" rx="0.5"/>
          <rect x="12.5" y="12" width="3" height="6" style="fill: var(--color-bank-green)" rx="0.5"/>
          <rect x="18" y="12" width="3" height="6" style="fill: var(--color-bank-green)" rx="0.5"/>
          <rect x="5" y="19" width="18" height="1.5" rx="0.5" style="fill: var(--color-bank-green)"/>
        </svg>
      </div>
      <div class="method-info">
        <div class="method-name">은행계좌</div>
        <div class="method-desc">등록된 계좌에서 바로 충전</div>
      </div>
      <span class="method-arrow">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M7 5l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    function selectMethod(el) {
      document.querySelectorAll('.method-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
  </script>
</body>
</html>
