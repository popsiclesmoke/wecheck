<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>직전송 안내</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      flex: 1;
      font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight);
    }
    .skip-btn {
      height: 36px; padding: 0 12px;
      background: none; border: none; cursor: pointer;
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
    }
    .content { flex: 1; overflow-y: auto; padding: 28px 16px 24px; }

    /* Illustration */
    .illustration {
      width: 100%; height: 160px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-2xl);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .illustration-inner {
      display: flex; align-items: center; gap: 16px;
    }
    .ill-node {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .ill-circle {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-title-xl-size);
    }
    .ill-circle-ext { background: var(--color-blue-100); }
    .ill-circle-chain { background: var(--color-bg-content-1); border: 2px dashed var(--color-border-divider); }
    .ill-circle-beple { background: linear-gradient(135deg, var(--color-blue-400), var(--color-primary)); }
    .ill-label { font-size: var(--text-body-xs-size); color: var(--color-text-description); font-weight: 500; }
    .ill-arrow {
      display: flex; align-items: center;
      color: var(--color-primary);
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 8px;
    }
    .page-sub {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .guide-steps { display: flex; flex-direction: column; gap: 0; }
    .guide-step-row {
      display: flex; gap: 16px;
      position: relative;
    }
    .step-left {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0;
    }
    .step-num-circle {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-sm-size); font-weight: 700; color: var(--color-bg);
      flex-shrink: 0;
    }
    .step-line {
      width: 2px; flex: 1;
      background: var(--color-border-card);
      margin: 4px 0;
      min-height: 24px;
    }
    .guide-step-row:last-child .step-line { display: none; }
    .step-right {
      padding-bottom: 24px;
      flex: 1;
      padding-top: 4px;
    }
    .step-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }
    .step-desc {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.5;
    }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">직전송 안내</span>
    <button class="skip-btn">건너뛰기</button>
  </div>

  <div class="content">
    <div class="illustration">
      <div class="illustration-inner">
        <div class="ill-node">
          <div class="ill-circle ill-circle-ext">&#x1F4BC;</div>
          <span class="ill-label">외부 지갑</span>
        </div>
        <div class="ill-arrow">
          <span data-icon="arrowRight" style="width:32px;height:16px;display:inline-flex"></span>
        </div>
        <div class="ill-node">
          <div class="ill-circle ill-circle-chain">&#x26D3;&#xFE0F;</div>
          <span class="ill-label">블록체인</span>
        </div>
        <div class="ill-arrow">
          <span data-icon="arrowRight" style="width:32px;height:16px;display:inline-flex"></span>
        </div>
        <div class="ill-node">
          <div class="ill-circle ill-circle-beple">B</div>
          <span class="ill-label">Beple</span>
        </div>
      </div>
    </div>

    <p class="page-title">외부 지갑에서<br>직접 전송하기</p>
    <p class="page-sub">USDT, USDC를 외부 지갑에서 Beple 지갑으로 직접 전송하여 충전할 수 있습니다</p>

    <div class="guide-steps">
      <div class="guide-step-row">
        <div class="step-left">
          <div class="step-num-circle">1</div>
          <div class="step-line"></div>
        </div>
        <div class="step-right">
          <div class="step-title">코인 선택</div>
          <div class="step-desc">전송할 코인(USDT/USDC)과 네트워크를 선택하세요</div>
        </div>
      </div>
      <div class="guide-step-row">
        <div class="step-left">
          <div class="step-num-circle">2</div>
          <div class="step-line"></div>
        </div>
        <div class="step-right">
          <div class="step-title">환불주소 등록</div>
          <div class="step-desc">전송 실패 시 반환받을 외부 지갑 주소를 등록하세요</div>
        </div>
      </div>
      <div class="guide-step-row">
        <div class="step-left">
          <div class="step-num-circle">3</div>
          <div class="step-line"></div>
        </div>
        <div class="step-right">
          <div class="step-title">수신주소로 전송</div>
          <div class="step-desc">발급된 QR코드 또는 주소로 코인을 전송하면 자동 충전됩니다</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">시작하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
