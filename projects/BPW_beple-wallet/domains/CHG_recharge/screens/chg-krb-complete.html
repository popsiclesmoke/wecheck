<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>충전 완료 (Korbit)</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .content {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .success-circle {
      width: var(--state-icon-size);
      height: var(--state-icon-size);
      border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: var(--state-gap-icon-msg);
      box-shadow: 0px 12px 32px color-mix(in srgb, var(--color-primary) 30%, transparent);
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      color: var(--color-white);
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .headline {
      font-size: var(--text-headline-size);
      font-weight: var(--text-headline-weight);
      color: var(--color-text-heading);
      margin-bottom: var(--state-gap-msg-desc);
    }

    .charge-amount {
      font-size: var(--text-title-2xl-size);
      font-weight: var(--text-title-2xl-weight);
      color: var(--color-primary);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .current-balance {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: var(--state-gap-desc-btn);
    }
    .current-balance strong {
      color: var(--color-text-title);
      font-weight: 600;
    }

    .divider-detail {
      width: 100%; background: var(--color-bg-content-2);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 32px;
      text-align: left;
    }
    .detail-row {
      display: flex; justify-content: space-between;
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 8px;
    }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-row .val { color: var(--color-text-title); font-weight: 500; }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="success-circle">
      <span data-icon="checkLg" style="width:32px;height:32px;display:inline-flex"></span>
    </div>

    <div class="headline">충전이 완료됐습니다</div>
    <div class="charge-amount">₩124,937</div>
    <div class="current-balance">현재 Beple Money: <strong>₩374,937</strong></div>

    <div class="divider-detail">
      <div class="detail-row">
        <span>충전 방법</span>
        <span class="val">Korbit BTC 매도</span>
      </div>
      <div class="detail-row">
        <span>매도 수량</span>
        <span class="val">0.00153 BTC</span>
      </div>
      <div class="detail-row">
        <span>충전 일시</span>
        <span class="val">2026.04.16 14:32</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">홈으로</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
