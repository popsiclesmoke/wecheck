<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>코인/네트워크 선택</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-usdt-from: #26A17B;
      --color-usdt-to: #1A8B6A;
      --color-usdc-from: #2775CA;
      --color-usdc-to: #1A5BAA;
      --color-eth-from: #627EEA;
      --color-eth-to: #3C5DE0;
      --color-trc-from: #EB0029;
      --color-trc-to: #C50022;
      --color-sol-from: #9945FF;
      --color-sol-to: #7B2FD6;
      --color-danger-bg: #FFF5F5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 24px 16px; }

    .section-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      margin-bottom: 12px;
    }

    .radio-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .radio-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border: 1.5px solid var(--color-border-card);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .radio-item:hover { border-color: var(--color-primary); }
    .radio-item.selected {
      border-color: var(--color-primary);
      background: var(--color-blue-50);
    }
    .radio-circle {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .radio-item.selected .radio-circle {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .radio-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-bg); opacity: 0;
    }
    .radio-item.selected .radio-dot { opacity: 1; }

    .radio-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-sm-size); font-weight: 800; color: var(--color-bg);
      flex-shrink: 0;
    }
    .icon-usdt { background: linear-gradient(135deg, var(--color-usdt-from), var(--color-usdt-to)); }
    .icon-usdc { background: linear-gradient(135deg, var(--color-usdc-from), var(--color-usdc-to)); }

    .radio-info { flex: 1; }
    .radio-name { font-size: var(--text-title-xs-size); font-weight: var(--text-title-xs-weight); color: var(--color-text-heading); }
    .radio-sub  { font-size: var(--text-body-xs-size); color: var(--color-text-description); margin-top: 2px; }

    /* Network options with network icons */
    .net-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-xs-size); font-weight: 700;
      flex-shrink: 0; color: var(--color-bg);
    }
    .net-erc { background: linear-gradient(135deg, var(--color-eth-from), var(--color-eth-to)); }
    .net-trc { background: linear-gradient(135deg, var(--color-trc-from), var(--color-trc-to)); }
    .net-sol { background: linear-gradient(135deg, var(--color-sol-from), var(--color-sol-to)); }

    .warning-card {
      background: var(--color-danger-bg);
      border: 1.5px solid var(--color-red-200);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .warning-icon { font-size: var(--text-title-md-size); flex-shrink: 0; }
    .warning-text {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-body);
      line-height: 1.6;
    }
    .warning-text strong { color: var(--color-error); font-weight: 600; }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">코인 선택</span>
  </div>

  <div class="content">
    <div class="section-title">전송할 코인</div>
    <div class="radio-group" id="coinGroup">
      <div class="radio-item selected" onclick="selectRadio('coinGroup', this)">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        <div class="radio-icon icon-usdt">T</div>
        <div class="radio-info">
          <div class="radio-name">USDT</div>
          <div class="radio-sub">Tether USD</div>
        </div>
      </div>
      <div class="radio-item" onclick="selectRadio('coinGroup', this)">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        <div class="radio-icon icon-usdc">C</div>
        <div class="radio-info">
          <div class="radio-name">USDC</div>
          <div class="radio-sub">USD Coin</div>
        </div>
      </div>
    </div>

    <div class="section-title">네트워크 선택</div>
    <div class="radio-group" id="netGroup">
      <div class="radio-item selected" onclick="selectRadio('netGroup', this)">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        <div class="net-icon net-erc">ERC</div>
        <div class="radio-info">
          <div class="radio-name">ERC-20</div>
          <div class="radio-sub">Ethereum 네트워크</div>
        </div>
      </div>
      <div class="radio-item" onclick="selectRadio('netGroup', this)">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        <div class="net-icon net-trc">TRC</div>
        <div class="radio-info">
          <div class="radio-name">TRC-20</div>
          <div class="radio-sub">Tron 네트워크</div>
        </div>
      </div>
      <div class="radio-item" onclick="selectRadio('netGroup', this)">
        <div class="radio-circle"><div class="radio-dot"></div></div>
        <div class="net-icon net-sol">SOL</div>
        <div class="radio-info">
          <div class="radio-name">Solana</div>
          <div class="radio-sub">Solana 네트워크</div>
        </div>
      </div>
    </div>

    <div class="warning-card">
      <span class="warning-icon">⛔</span>
      <div class="warning-text">
        <strong>네트워크 불일치 시 자산 손실</strong>이 발생합니다.<br>
        반드시 선택한 코인·네트워크와 동일하게 전송해 주세요.
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">다음</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    function selectRadio(groupId, el) {
      document.getElementById(groupId).querySelectorAll('.radio-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
    }
  </script>
</body>
</html>
