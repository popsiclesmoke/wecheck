<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>CHG-KRB-000 Korbit 이용약관</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px; background: var(--color-bg);
      display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .back-btn {
      width: 40px; height: 40px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-heading); border-radius: var(--radius-md); margin-left: -8px;
    }
    .back-btn:hover { background: var(--color-bg-content-1); }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      margin-left: 4px;
    }

    /* Content */
    .content {
      flex: 1; padding: 8px 20px 0;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      line-height: 1.35;
      margin-bottom: 32px;
    }

    /* All agree row */
    .all-agree {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-lg);
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 0;
    }
    .all-agree.checked {
      border-color: var(--color-primary);
      background: var(--color-blue-50);
    }
    .all-agree-label {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      flex: 1;
    }
    .agree-check-box {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--color-bg);
      transition: all 0.15s;
    }
    .all-agree.checked .agree-check-box {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .check-svg { display: none; }
    .checked .check-svg { display: inline-flex; }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--color-border-divider);
      margin: 16px 0;
    }

    /* Individual terms */
    .terms-list {
      display: flex;
      flex-direction: column;
    }
    .term-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 4px;
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: background 0.1s;
    }
    .term-row:hover { background: var(--color-bg-content-2); }
    .term-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .term-row.checked .term-check {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .term-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .term-title {
      font-size: var(--text-body-lg-size);
      color: var(--color-text-title);
      font-weight: 400;
    }
    .term-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-size: 10px;
      font-weight: 600;
      margin-right: 6px;
    }
    .tag-required {
      background: var(--color-blue-100);
      color: var(--color-primary);
    }
    .term-chevron {
      width: 20px; height: 20px;
      color: var(--color-text-disabled);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* Bottom button */
    .btn-area {
      padding: 16px 20px 32px; flex-shrink: 0;
    }
    .btn-primary {
      display: block; width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-bg);
      border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer; letter-spacing: -0.2px;
    }
    .btn-primary:disabled {
      background: var(--color-gray-400); cursor: not-allowed;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">Korbit 이용약관</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-title">Korbit 서비스 이용을 위해<br>약관에 동의해주세요</div>

    <!-- All agree -->
    <div class="all-agree" id="allAgree" onclick="toggleAll()">
      <div class="agree-check-box">
        <span class="check-svg" data-icon="checkAll" style="width:13px;height:13px;display:inline-flex;color:var(--color-bg)"></span>
      </div>
      <div class="all-agree-label">전체 동의</div>
    </div>

    <div class="divider"></div>

    <!-- Individual terms -->
    <div class="terms-list">
      <div class="term-row" id="term1" onclick="toggleTerm('term1')">
        <div class="term-check">
          <span class="check-svg" data-icon="checkSm" style="width:12px;height:12px;display:inline-flex;color:var(--color-bg)"></span>
        </div>
        <div class="term-info">
          <span class="term-title">
            <span class="term-tag tag-required">필수</span>Korbit 이용약관
          </span>
        </div>
        <div class="term-chevron">
          <span data-icon="chevronRight" style="width:20px;height:20px;display:inline-flex"></span>
        </div>
      </div>

      <div class="term-row" id="term2" onclick="toggleTerm('term2')">
        <div class="term-check">
          <span class="check-svg" data-icon="checkSm" style="width:12px;height:12px;display:inline-flex;color:var(--color-bg)"></span>
        </div>
        <div class="term-info">
          <span class="term-title">
            <span class="term-tag tag-required">필수</span>개인정보 제3자 제공
          </span>
        </div>
        <div class="term-chevron">
          <span data-icon="chevronRight" style="width:20px;height:20px;display:inline-flex"></span>
        </div>
      </div>

      <div class="term-row" id="term3" onclick="toggleTerm('term3')">
        <div class="term-check">
          <span class="check-svg" data-icon="checkSm" style="width:12px;height:12px;display:inline-flex;color:var(--color-bg)"></span>
        </div>
        <div class="term-info">
          <span class="term-title">
            <span class="term-tag tag-required">필수</span>전자금융거래 이용약관
          </span>
        </div>
        <div class="term-chevron">
          <span data-icon="chevronRight" style="width:20px;height:20px;display:inline-flex"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-area">
    <button class="btn-primary" id="agreeBtn" disabled onclick="location.href='chg-krb-connect.html'">동의하고 계속하기</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    var required = ['term1', 'term2', 'term3'];
    var all = ['term1', 'term2', 'term3'];

    function toggleAll() {
      var allEl = document.getElementById('allAgree');
      var isChecked = allEl.classList.contains('checked');
      if (isChecked) {
        allEl.classList.remove('checked');
        all.forEach(function(id) { document.getElementById(id).classList.remove('checked'); });
      } else {
        allEl.classList.add('checked');
        all.forEach(function(id) { document.getElementById(id).classList.add('checked'); });
      }
      updateBtn();
    }

    function toggleTerm(id) {
      document.getElementById(id).classList.toggle('checked');
      var allChecked = all.every(function(i) { return document.getElementById(i).classList.contains('checked'); });
      document.getElementById('allAgree').classList.toggle('checked', allChecked);
      updateBtn();
    }

    function updateBtn() {
      var reqOk = required.every(function(i) { return document.getElementById(i).classList.contains('checked'); });
      document.getElementById('agreeBtn').disabled = !reqOk;
    }
  </script>
</body>
</html>
