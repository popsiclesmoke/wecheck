<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>출금 동의</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-warning-bg: #FFFBEA;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px; gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title { font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight); }
    .content { flex: 1; overflow-y: auto; padding: 28px 16px 24px; }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 20px;
      line-height: 1.3;
    }

    .warning-card {
      background: var(--color-warning-bg);
      border: 1px solid var(--color-yellow-200);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 24px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .warning-icon { font-size: var(--text-title-md-size); line-height: 1.4; flex-shrink: 0; }
    .warning-text {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-title);
      line-height: 1.6;
    }
    .warning-text strong { font-weight: 600; color: var(--color-text-heading); }

    .section-label {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-description);
      margin-bottom: 8px;
    }

    .bank-selector {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
      height: var(--input-height);
      border: 1px solid var(--color-border-divider);
      border-radius: var(--radius-md);
      cursor: pointer;
      background: var(--color-bg);
      margin-bottom: 20px;
    }
    .bank-selector-left { display: flex; align-items: center; gap: 10px; }
    .bank-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-blue-100);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-xs-size); font-weight: 700; color: var(--color-primary);
    }
    .bank-name { font-size: var(--text-body-lg-size); color: var(--color-text-heading); font-weight: 500; }
    .bank-account { font-size: var(--text-body-sm-size); color: var(--color-text-description); }
    .dropdown-arrow { color: var(--color-text-disabled); }

    .ars-card {
      background: var(--color-bg-content-2);
      border-radius: var(--radius-lg);
      padding: 18px 16px;
      margin-bottom: 20px;
    }
    .ars-title {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-title);
      margin-bottom: 10px;
    }
    .ars-number {
      font-size: var(--text-headline-size);
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .ars-desc {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      line-height: 1.6;
    }

    .guide-steps { display: flex; flex-direction: column; gap: 8px; }
    .guide-step {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: var(--text-body-sm-size); color: var(--color-text-body);
      line-height: 1.5;
    }
    .guide-step-num {
      font-size: var(--text-body-xs-size); font-weight: 700;
      color: var(--color-primary);
      background: var(--color-blue-100);
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    .footer { padding: 16px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="topbar-title">출금 동의</span>
  </div>

  <div class="content">
    <p class="page-title">출금 동의가<br>필요합니다</p>

    <div class="warning-card">
      <span class="warning-icon">⚠️</span>
      <div class="warning-text">
        <strong>1원 소액 계좌 인증</strong>이 필요합니다.<br>
        아래 은행 계좌로 1원이 입금되며, ARS 전화를 통해 출금 동의를 완료해 주세요.
      </div>
    </div>

    <div class="section-label">동의 은행 계좌 선택</div>
    <div class="bank-selector">
      <div class="bank-selector-left">
        <div class="bank-dot">신</div>
        <div>
          <div class="bank-name">신한은행</div>
          <div class="bank-account">110-***-****52</div>
        </div>
      </div>
      <span class="dropdown-arrow">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 7.5l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <div class="section-label">ARS 출금 동의 안내</div>
    <div class="ars-card">
      <div class="ars-title">ARS 인증 번호</div>
      <div class="ars-number">1588-5000</div>
      <div class="ars-desc">위 번호로 자동 전화가 연결됩니다</div>
      <div style="margin-top: 14px;">
        <div class="guide-steps">
          <div class="guide-step">
            <span class="guide-step-num">1</span>
            1원이 등록 계좌로 입금됩니다
          </div>
          <div class="guide-step">
            <span class="guide-step-num">2</span>
            ARS 전화로 '1번' 을 눌러 출금 동의합니다
          </div>
          <div class="guide-step">
            <span class="guide-step-num">3</span>
            동의 완료 후 코인 선택 화면으로 이동합니다
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary">동의하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
