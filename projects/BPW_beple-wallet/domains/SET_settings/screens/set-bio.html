<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>생체인증 설정</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --shadow-bio-icon: 0 8px 24px color-mix(in srgb, var(--color-primary) 30%, transparent);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--color-bg); color: var(--color-text-heading); }

    /* ── Status Bar ── */
    .status-bar {
      width: 360px; height: 24px;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .status-bar-time { font-size: var(--text-body-xs-size); font-weight: 600; color: var(--color-text-heading); }

    /* ── TopBar ── */
    .topbar {
      width: 360px; height: 56px;
      background: var(--color-bg);
      display: flex; align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--color-border-card);
      gap: 8px;
    }
    .topbar-back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      border-radius: 50%; flex-shrink: 0;
    }
    .topbar-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      flex: 1; text-align: center;
      margin-right: 36px;
    }

    /* ── Main Layout — Vertically Centered ── */
    .main-layout {
      width: 360px;
      height: calc(800px - 24px - 56px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 24px 0;
    }

    /* ── Bio Icon ── */
    .bio-icon-wrap {
      width: var(--state-icon-size); height: var(--state-icon-size);
      border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-bio-icon);
    }

    /* ── Ripple Ring ── */
    .bio-icon-ring {
      position: relative;
      width: var(--state-icon-size); height: var(--state-icon-size);
      margin-bottom: 24px;
    }
    .bio-ring-1, .bio-ring-2 {
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--color-primary);
      opacity: 0.15;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .bio-ring-1 { width: 80px; height: 80px; }
    .bio-ring-2 { width: 96px; height: 96px; }

    /* ── Text Content ── */
    .bio-title {
      font-size: var(--text-title-lg-size);
      font-weight: var(--text-title-lg-weight);
      color: var(--color-text-heading);
      text-align: center;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .bio-desc {
      font-size: var(--text-body-sm-size);
      font-weight: var(--text-body-sm-weight);
      color: var(--color-text-description);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* ── Info Card ── */
    .info-card {
      width: 100%;
      background: var(--color-blue-50);
      border-radius: var(--radius-xl);
      padding: 14px 16px;
      margin-bottom: 40px;
    }
    .info-row {
      display: flex; align-items: flex-start; gap: 10px;
    }
    .info-row + .info-row { margin-top: 10px; }
    .info-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-primary);
      flex-shrink: 0; margin-top: 6px;
    }
    .info-text {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-body);
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-stack {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none; cursor: pointer;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit;
    }
    .btn-ghost {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-white);
      color: var(--color-text-body);
      border: 1.5px solid var(--color-border-divider);
      cursor: pointer;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit;
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <span data-icon="wifi" style="width:14px;height:14px;display:inline-flex;color:var(--color-text-heading)"></span>
    </div>
  </div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="topbar-back" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:22px;height:22px;display:inline-flex;color:var(--color-text-heading)"></span>
    </button>
    <span class="topbar-title">생체인증 설정</span>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">

    <!-- Biometric Icon with Rings -->
    <div class="bio-icon-ring">
      <div class="bio-ring-2"></div>
      <div class="bio-ring-1"></div>
      <div class="bio-icon-wrap" style="position:relative;z-index:1;">
        <!-- Fingerprint Icon -->
        <span data-icon="fingerprint" style="width:32px;height:32px;display:inline-flex;color:var(--color-white)"></span>
      </div>
    </div>

    <!-- Title & Description -->
    <div class="bio-title">생체인증을<br>활성화하시겠어요?</div>
    <div class="bio-desc">
      지문 또는 얼굴 인식을 사용하면<br>
      PIN 입력 없이 빠르고 안전하게<br>
      로그인할 수 있어요.
    </div>

    <!-- Info Card -->
    <div class="info-card">
      <div class="info-row">
        <div class="info-dot"></div>
        <div class="info-text">생체인증은 이 기기에서만 사용할 수 있어요.</div>
      </div>
      <div class="info-row">
        <div class="info-dot"></div>
        <div class="info-text">언제든지 설정에서 비활성화할 수 있어요.</div>
      </div>
      <div class="info-row">
        <div class="info-dot"></div>
        <div class="info-text">PIN이 기기에 등록된 경우에만 사용 가능해요.</div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-stack">
      <button class="btn-primary">확인</button>
      <button class="btn-ghost">취소</button>
    </div>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
