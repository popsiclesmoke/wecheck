<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>언어 설정</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--color-bg-content-1); color: var(--color-text-heading); }

    /* ── Status Bar ── */
    .status-bar {
      width: 360px; height: 24px;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .status-bar-time { font-size: var(--text-body-xs-size); font-weight: 600; color: var(--color-text-heading); }

    /* ── TopBar ── */
    .topbar {
      position: fixed; top: 24px; left: 0;
      width: 360px; height: 56px;
      background: var(--color-bg);
      display: flex; align-items: center;
      padding: 0 16px;
      z-index: 100;
      border-bottom: 1px solid var(--color-border-card);
      gap: 8px;
    }
    .topbar-back {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      border-radius: 50%; flex-shrink: 0;
    }
    .topbar-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      flex: 1; text-align: center;
      margin-right: 36px;
    }

    /* ── Page Content ── */
    .page-content {
      position: absolute; top: 80px; bottom: 0; left: 0;
      width: 360px;
      display: flex; flex-direction: column;
    }

    /* ── Description ── */
    .page-desc {
      padding: 20px 20px 8px;
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.5;
    }

    /* ── Language List ── */
    .language-list {
      flex: 1;
      background: var(--color-bg);
      overflow: hidden;
    }
    .lang-item {
      display: flex; align-items: center;
      height: 64px;
      padding: 0 20px;
      gap: 14px;
      border: none; width: 100%; cursor: pointer;
      text-align: left;
      transition: background 0.1s;
    }
    .lang-item.selected {
      background: var(--color-blue-50);
    }
    .lang-item + .lang-item {
      border-top: 1px solid var(--color-border-card);
    }

    /* Radio Circle */
    .radio-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--color-gray-400);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .radio-circle.checked {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .radio-circle.checked::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-white);
    }

    .lang-info { flex: 1; }
    .lang-name {
      font-size: var(--text-body-lg-size);
      font-weight: 500;
      color: var(--color-text-title);
    }
    .lang-name.selected-text { color: var(--color-primary); font-weight: 600; }
    .lang-native {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      margin-top: 2px;
    }
    .lang-current-badge {
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      color: var(--color-primary);
      background: var(--color-blue-100);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
    }

    /* ── Bottom CTA ── */
    .bottom-cta {
      padding: 16px 20px;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border-card);
    }
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none; cursor: pointer;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit;
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <span data-icon="wifi" style="width:14px;height:14px;display:inline-flex;color:var(--color-text-heading)"></span>
    </div>
  </div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="topbar-back" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:22px;height:22px;display:inline-flex;color:var(--color-text-heading)"></span>
    </button>
    <span class="topbar-title">언어 설정</span>
  </div>

  <!-- Page Content -->
  <div class="page-content">

    <div class="page-desc">앱 화면에 표시될 언어를 선택하세요.</div>

    <!-- Language List -->
    <div class="language-list">
      <!-- 한국어 — selected -->
      <button class="lang-item selected">
        <div class="radio-circle checked"></div>
        <div class="lang-info">
          <div class="lang-name selected-text">한국어</div>
          <div class="lang-native">Korean</div>
        </div>
        <span class="lang-current-badge">사용 중</span>
      </button>

      <!-- English -->
      <button class="lang-item">
        <div class="radio-circle"></div>
        <div class="lang-info">
          <div class="lang-name">English</div>
          <div class="lang-native">English</div>
        </div>
      </button>

      <!-- 日本語 -->
      <button class="lang-item">
        <div class="radio-circle"></div>
        <div class="lang-info">
          <div class="lang-name">日本語</div>
          <div class="lang-native">Japanese</div>
        </div>
      </button>

      <!-- 中文 (简体) -->
      <button class="lang-item">
        <div class="radio-circle"></div>
        <div class="lang-info">
          <div class="lang-name">中文 (简体)</div>
          <div class="lang-native">Chinese (Simplified)</div>
        </div>
      </button>

      <!-- Español -->
      <button class="lang-item">
        <div class="radio-circle"></div>
        <div class="lang-info">
          <div class="lang-name">Español</div>
          <div class="lang-native">Spanish</div>
        </div>
      </button>
    </div>

    <!-- Bottom CTA -->
    <div class="bottom-cta">
      <button class="btn-primary">변경하기</button>
    </div>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
