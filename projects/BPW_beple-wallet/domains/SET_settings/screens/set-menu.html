<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>설정</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-red-soft: color-mix(in srgb, var(--color-red-500) 6%, var(--color-white));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--color-bg-content-1); color: var(--color-text-heading); }

    /* ── Status Bar ── */
    .status-bar {
      width: 360px; height: 24px;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .status-bar-time { font-size: var(--text-body-xs-size); font-weight: 600; color: var(--color-text-heading); }

    /* ── TopBar ── */
    .topbar {
      position: fixed; top: 24px; left: 0;
      width: 360px; height: 56px;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: center;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid var(--color-border-card);
    }
    .topbar-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
    }

    /* ── Scroll Body ── */
    .scroll-body {
      position: absolute; top: 80px; bottom: 56px; left: 0;
      width: 360px;
      overflow-y: auto; overflow-x: hidden;
      background: var(--color-bg-content-1);
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* ── User Info Card ── */
    .user-card {
      background: var(--color-bg);
      margin: 16px 16px 0;
      border-radius: var(--radius-2xl);
      padding: 16px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--shadow-card);
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--color-blue-100);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar-initials {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-primary);
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }
    .user-contact {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
    }
    .user-edit-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--color-bg-content-1);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-description);
    }

    /* ── Section Label ── */
    .section-label {
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      color: var(--color-text-description);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 16px 16px 6px;
    }

    /* ── Menu List ── */
    .menu-group {
      background: var(--color-bg);
      margin: 0 16px;
      border-radius: var(--radius-2xl);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .menu-item {
      display: flex; align-items: center;
      height: 56px;
      padding: 0 16px;
      gap: 14px;
      border: none; background: none; width: 100%;
      cursor: pointer; text-align: left;
    }
    .menu-item + .menu-item {
      border-top: 1px solid var(--color-border-card);
    }
    .menu-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .menu-icon.blue { background: var(--color-blue-100); }
    .menu-icon.gray { background: var(--color-bg-content-1); }
    .menu-icon.red-soft { background: var(--color-red-soft); }

    .menu-label {
      flex: 1;
      font-size: var(--text-body-lg-size);
      font-weight: 500;
      color: var(--color-text-title);
    }
    .menu-label.red { color: var(--color-red-700); }

    .menu-value {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-right: 6px;
    }

    /* ── Toggle Switch ── */
    .toggle-switch {
      position: relative;
      width: 44px; height: 26px; flex-shrink: 0;
    }
    .toggle-switch input { display: none; }
    .toggle-track {
      position: absolute; inset: 0;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-track.on { background: var(--color-primary); }
    .toggle-track.off { background: var(--color-gray-400); }
    .toggle-thumb {
      position: absolute; top: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--color-white);
      box-shadow: var(--shadow-card);
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 21px; }
    .toggle-track.off .toggle-thumb { left: 3px; }

    /* ── Bottom TabBar (3-tab) ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0;
      width: 360px; height: 56px;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border-card);
      display: flex; align-items: center;
      z-index: 100;
    }
    .tab-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; height: 100%;
      border: none; background: none; cursor: pointer;
    }
    .tab-label { font-size: var(--text-body-xs-size); font-weight: 500; color: var(--color-text-description); }
    .tab-item.active .tab-label { color: var(--color-primary); font-weight: 700; }
    .tab-center-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      margin-top: -20px;
      box-shadow: var(--shadow-card);
    }

    /* ── Logout Confirm Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 360px; height: 800px;
      background: var(--dimmed-bg);
      opacity: var(--dimmed-opacity);
      z-index: 200;
    }
    .modal-overlay.show {
      display: block;
    }
    .modal-card {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--popup-width);
      background: var(--color-bg);
      border-radius: var(--popup-radius);
      box-shadow: var(--popup-shadow);
      z-index: 201;
      padding: var(--popup-padding-top) var(--popup-padding-x) var(--popup-padding-bottom);
      text-align: center;
    }
    .modal-card.show {
      display: block;
    }
    .modal-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      margin-bottom: 12px;
    }
    .modal-body {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-body);
      margin-bottom: var(--popup-gap-content-btn);
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      gap: var(--alert-btn-gap);
    }
    .modal-btn {
      flex: 1;
      height: var(--btn-lg-height);
      border-radius: var(--btn-lg-radius);
      font-size: var(--btn-lg-font-size);
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .modal-btn.secondary {
      background: var(--color-bg-content-1);
      color: var(--color-text-body);
    }
    .modal-btn.danger {
      background: var(--color-error);
      color: var(--color-white);
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <span data-icon="wifi" style="width:14px;height:14px;display:inline-flex;color:var(--color-text-heading)"></span>
    </div>
  </div>

  <!-- TopBar -->
  <div class="topbar">
    <span class="topbar-title">설정</span>
  </div>

  <!-- Scroll Body -->
  <div class="scroll-body">

    <!-- User Info Card -->
    <div class="user-card">
      <div class="avatar">
        <span class="avatar-initials">홍</span>
      </div>
      <div class="user-info">
        <div class="user-name">홍길동</div>
        <div class="user-contact">010-1234-5678</div>
        <div class="user-contact">nare429@beple.co.kr</div>
      </div>
      <button class="user-edit-btn" aria-label="프로필 편집">
        <span data-icon="edit" style="width:16px;height:16px;display:inline-flex;color:var(--color-text-description)"></span>
      </button>
    </div>

    <!-- Preferences Section -->
    <div class="section-label">환경 설정</div>
    <div class="menu-group">
      <!-- Language -->
      <button class="menu-item">
        <div class="menu-icon blue">
          <span data-icon="globe" style="width:18px;height:18px;display:inline-flex;color:var(--color-primary)"></span>
        </div>
        <span class="menu-label">언어 설정</span>
        <span class="menu-value">한국어</span>
        <span data-icon="chevronRight" style="width:16px;height:16px;display:inline-flex;color:var(--color-gray-400)"></span>
      </button>

      <!-- Notification Toggle -->
      <button class="menu-item">
        <div class="menu-icon blue">
          <span data-icon="bell" style="width:18px;height:18px;display:inline-flex;color:var(--color-primary)"></span>
        </div>
        <span class="menu-label">알림 설정</span>
        <div class="toggle-switch">
          <div class="toggle-track on">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </button>

      <!-- Biometric Toggle -->
      <button class="menu-item">
        <div class="menu-icon gray">
          <span data-icon="fingerprint" style="width:18px;height:18px;display:inline-flex;color:var(--color-text-description)"></span>
        </div>
        <span class="menu-label">생체인증</span>
        <div class="toggle-switch">
          <div class="toggle-track off">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </button>
    </div>

    <!-- Security Section -->
    <div class="section-label">보안</div>
    <div class="menu-group">
      <!-- PIN Change -->
      <button class="menu-item">
        <div class="menu-icon blue">
          <span data-icon="lock" style="width:18px;height:18px;display:inline-flex;color:var(--color-primary)"></span>
        </div>
        <span class="menu-label">PIN 변경</span>
        <span data-icon="chevronRight" style="width:16px;height:16px;display:inline-flex;color:var(--color-gray-400)"></span>
      </button>
    </div>

    <!-- Account Section -->
    <div class="section-label">계정</div>
    <div class="menu-group">
      <!-- Logout -->
      <button class="menu-item" id="logoutBtn">
        <div class="menu-icon red-soft">
          <span data-icon="logOut" style="width:18px;height:18px;display:inline-flex;color:var(--color-red-700)"></span>
        </div>
        <span class="menu-label red">로그아웃</span>
        <span data-icon="chevronRight" style="width:16px;height:16px;display:inline-flex;color:var(--color-gray-400)"></span>
      </button>
    </div>

    <!-- App Version -->
    <div style="text-align:center;padding:20px 0 12px;">
      <div style="font-size:var(--text-body-xs-size);color:var(--color-text-description);">비플월렛 v1.0.0</div>
    </div>
  </div>

  <!-- Bottom TabBar (3-tab) — 더보기 active -->
  <nav class="tabbar">
    <button class="tab-item">
      <span data-icon="creditCard" style="width:22px;height:22px;display:inline-flex;color:var(--color-text-description)"></span>
      <span class="tab-label">결제내역</span>
    </button>
    <button class="tab-item">
      <div class="tab-center-icon">
        <span data-icon="home" style="width:24px;height:24px;display:inline-flex;color:var(--color-white)"></span>
      </div>
      <span class="tab-label">홈</span>
    </button>
    <button class="tab-item active">
      <span data-icon="moreHorizontal" style="width:22px;height:22px;display:inline-flex;color:var(--color-primary)"></span>
      <span class="tab-label">더보기</span>
    </button>
  </nav>

  <!-- Logout Confirm Modal -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal-card" id="modalCard">
    <div class="modal-title">로그아웃</div>
    <div class="modal-body">정말 로그아웃 하시겠습니까?</div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modalCancel">취소</button>
      <button class="modal-btn danger" id="modalConfirm">로그아웃</button>
    </div>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    (function() {
      var logoutBtn = document.getElementById('logoutBtn');
      var overlay = document.getElementById('modalOverlay');
      var card = document.getElementById('modalCard');
      var cancelBtn = document.getElementById('modalCancel');
      var confirmBtn = document.getElementById('modalConfirm');

      function openModal() {
        overlay.classList.add('show');
        card.classList.add('show');
      }

      function closeModal() {
        overlay.classList.remove('show');
        card.classList.remove('show');
      }

      logoutBtn.addEventListener('click', openModal);
      cancelBtn.addEventListener('click', closeModal);
      overlay.addEventListener('click', closeModal);

      confirmBtn.addEventListener('click', function() {
        location.href = '../../ONB_onboarding/screens/onb-language.html';
      });
    })();
  </script>
</body>
</html>
