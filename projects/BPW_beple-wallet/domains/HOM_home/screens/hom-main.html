<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>홈 — 메인</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--color-bg-content-1); color: var(--color-text-heading); }

    /* ── Status Bar ── */
    .status-bar {
      width: 360px; height: 24px;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .status-bar-time { font-size: var(--text-body-xs-size); font-weight: 600; color: var(--color-text-heading); }
    .status-bar-icons { display: flex; align-items: center; gap: 4px; }
    .status-bar-icons svg { width: 14px; height: 14px; fill: var(--color-text-heading); }

    /* ── TopBar ── */
    .topbar {
      position: fixed; top: 24px; left: 0;
      width: 360px; height: 56px;
      background: var(--color-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
      border-bottom: 1px solid var(--color-border-card);
    }
    .topbar-logo {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-primary);
    }
    .topbar-icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer; position: relative;
      border-radius: 50%;
    }
    .notif-badge {
      position: absolute; top: 5px; right: 5px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-red-500);
      border: 1.5px solid var(--color-bg);
    }

    /* ── Scrollable Body ── */
    .scroll-body {
      position: absolute; top: 80px; bottom: 56px; left: 0;
      width: 360px;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--color-bg-content-1);
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* ── Balance Card ── */
    .balance-section { padding: 16px 16px 0; }
    .balance-card {
      background: var(--color-blue-50);
      border-radius: var(--radius-2xl);
      padding: 20px;
      box-shadow: var(--shadow-card);
    }
    .balance-label {
      font-size: var(--text-body-sm-size);
      font-weight: var(--text-body-sm-weight);
      color: var(--color-text-description);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .balance-label-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-primary);
    }
    .balance-amount-row {
      display: flex; align-items: baseline; gap: 4px;
      margin-bottom: 14px;
    }
    .balance-amount {
      font-size: var(--text-title-2xl-size);
      font-weight: var(--text-title-2xl-weight);
      color: var(--color-text-heading);
    }
    .balance-unit {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-title);
    }
    .balance-divider {
      height: 1px;
      background: var(--color-blue-200);
      margin-bottom: 14px;
    }
    .balance-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .balance-footer-text {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
    }
    .balance-footer-refresh {
      display: flex; align-items: center; gap: 4px;
      font-size: var(--text-body-xs-size);
      color: var(--color-primary);
      font-weight: 600;
    }

    /* ── Quick Actions ── */
    .quick-actions { padding: 16px 16px 0; }
    .quick-actions-grid {
      background: var(--color-bg);
      border-radius: var(--radius-2xl);
      padding: 16px 8px;
      display: flex;
      box-shadow: var(--shadow-card);
    }
    .quick-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      border: none; background: none; cursor: pointer;
    }
    .quick-btn-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--color-blue-100);
      display: flex; align-items: center; justify-content: center;
    }
    .quick-btn-label {
      font-size: var(--text-body-sm-size);
      font-weight: 600;
      color: var(--color-text-title);
    }

    /* ── Section Header ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 16px 10px;
    }
    .section-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
    }

    /* ── Charge Method Cards ── */
    .charge-method-list {
      display: flex; flex-direction: column; gap: 12px;
      padding: 0 16px;
    }
    .charge-card {
      background: var(--color-bg-content-2);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      max-width: 100%;
      overflow: hidden;
    }
    .charge-card-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--color-blue-50);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .charge-card-icon-text {
      font-size: var(--text-title-md-size);
      font-weight: 700;
      color: var(--color-primary);
    }
    .charge-card-info {
      flex: 1;
      min-width: 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .charge-card-name {
      font-size: var(--text-body-lg-size);
      font-weight: 700;
      color: var(--color-text-heading);
    }
    .charge-card-status {
      font-size: var(--text-body-xs-size);
    }
    .charge-card-status.connected {
      color: var(--color-mint-500);
    }
    .charge-card-status.info {
      color: var(--color-text-description);
    }
    .charge-card-action {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .charge-card-action-text {
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      color: var(--color-text-body);
    }
    .charge-card-action-arrow {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-description);
    }

    /* ── Banner ── */
    .banner-section { padding: 16px; }
    .banner-card {
      border-radius: var(--radius-2xl);
      background: var(--gradient-blue);
      padding: 20px;
      display: flex; align-items: center; justify-content: space-between;
      overflow: hidden; position: relative;
      min-height: 88px;
      box-shadow: var(--shadow-card);
    }
    .banner-content { flex: 1; }
    .banner-badge {
      display: inline-block;
      background: var(--color-white);
      color: var(--color-primary);
      font-size: var(--text-body-xs-size);
      font-weight: 700;
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      margin-bottom: 8px;
    }
    .banner-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-white);
      line-height: 1.3;
    }
    .banner-sub {
      font-size: var(--text-body-xs-size);
      color: var(--color-blue-200);
      margin-top: 4px;
    }
    .banner-circle-deco {
      position: absolute; right: -10px; top: -10px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--color-white) 10%, transparent);
    }
    .banner-circle-deco2 {
      position: absolute; right: 30px; bottom: -30px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--color-white) 7%, transparent);
    }
    .banner-indicator {
      display: flex; justify-content: center; gap: 5px;
      margin-top: 10px;
    }
    .banner-dot {
      width: 6px; height: 6px; border-radius: 3px;
      background: var(--color-gray-400);
    }
    .banner-dot.active {
      width: 16px;
      background: var(--color-primary);
    }

    /* ── Bottom TabBar (3-tab) ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0;
      width: 360px; height: 56px;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border-card);
      display: flex; align-items: center;
      z-index: 100;
    }
    .tab-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      height: 100%;
      border: none; background: none; cursor: pointer;
      text-decoration: none;
    }
    .tab-label {
      font-size: var(--text-body-xs-size);
      font-weight: 500;
      color: var(--color-text-description);
    }
    .tab-item.active .tab-label { color: var(--color-primary); font-weight: 700; }
    .tab-center-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      margin-top: -20px;
      box-shadow: var(--shadow-card);
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-bar-time">9:41</span>
    <div class="status-bar-icons">
      <span data-icon="wifi" style="width:14px;height:14px;display:inline-flex;color:var(--color-text-heading)"></span>
      <span data-icon="battery" style="width:14px;height:14px;display:inline-flex;color:var(--color-text-heading)"></span>
    </div>
  </div>

  <!-- TopBar -->
  <div class="topbar">
    <span class="topbar-logo">비플월렛</span>
    <button class="topbar-icon-btn" aria-label="알림">
      <span data-icon="bell" style="width:22px;height:22px;display:inline-flex;color:var(--color-text-heading)"></span>
      <span class="notif-badge"></span>
    </button>
  </div>

  <!-- Scrollable Body -->
  <div class="scroll-body">

    <!-- Balance Card -->
    <div class="balance-section">
      <div class="balance-card">
        <div class="balance-label">
          <span class="balance-label-dot"></span>
          Beple Money
        </div>
        <div class="balance-amount-row">
          <span class="balance-amount">&#8361;125,000</span>
          <span class="balance-unit">원</span>
        </div>
        <div class="balance-divider"></div>
        <div class="balance-footer">
          <span class="balance-footer-text">마지막 업데이트: 방금 전</span>
          <span class="balance-footer-refresh">
            <span data-icon="refresh" style="width:12px;height:12px;display:inline-flex;color:var(--color-primary)"></span>
            새로고침
          </span>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <div class="quick-actions-grid">
        <button class="quick-btn">
          <div class="quick-btn-circle">
            <span data-icon="plus" style="width:22px;height:22px;display:inline-flex;color:var(--color-primary)"></span>
          </div>
          <span class="quick-btn-label">충전</span>
        </button>
        <button class="quick-btn">
          <div class="quick-btn-circle">
            <span data-icon="creditCard" style="width:22px;height:22px;display:inline-flex;color:var(--color-primary)"></span>
          </div>
          <span class="quick-btn-label">결제</span>
        </button>
        <button class="quick-btn">
          <div class="quick-btn-circle">
            <span data-icon="arrowDown" style="width:22px;height:22px;display:inline-flex;color:var(--color-primary)"></span>
          </div>
          <span class="quick-btn-label">출금</span>
        </button>
      </div>
    </div>

    <!-- Charge Method Section -->
    <div class="section-header">
      <span class="section-title">충전 수단</span>
    </div>
    <div class="charge-method-list">

      <!-- Korbit — Connected -->
      <div class="charge-card">
        <div class="charge-card-icon">
          <span class="charge-card-icon-text">K</span>
        </div>
        <div class="charge-card-info">
          <span class="charge-card-name">Korbit</span>
          <span class="charge-card-status connected">연결됨</span>
        </div>
        <div class="charge-card-action">
          <span class="charge-card-action-text">코인매도 충전</span>
          <span class="charge-card-action-arrow" data-icon="chevronRight"></span>
        </div>
      </div>

      <!-- Bank Account — Registered -->
      <div class="charge-card">
        <div class="charge-card-icon">
          <span data-icon="creditCard" style="width:20px;height:20px;display:inline-flex;color:var(--color-primary)"></span>
        </div>
        <div class="charge-card-info">
          <span class="charge-card-name">신한은행</span>
          <span class="charge-card-status info">****1234</span>
        </div>
        <div class="charge-card-action">
          <span class="charge-card-action-text">계좌충전</span>
          <span class="charge-card-action-arrow" data-icon="chevronRight"></span>
        </div>
      </div>

      <!-- External Wallet -->
      <div class="charge-card">
        <div class="charge-card-icon">
          <span data-icon="globe" style="width:20px;height:20px;display:inline-flex;color:var(--color-primary)"></span>
        </div>
        <div class="charge-card-info">
          <span class="charge-card-name">외부 지갑</span>
          <span class="charge-card-status info">USDT &middot; USDC 직전송</span>
        </div>
        <div class="charge-card-action">
          <span class="charge-card-action-arrow" data-icon="chevronRight"></span>
        </div>
      </div>

    </div>

    <!-- Banner -->
    <div class="section-header">
      <span class="section-title">이벤트</span>
    </div>
    <div class="banner-section" style="padding-top:0;">
      <div class="banner-card">
        <div class="banner-circle-deco"></div>
        <div class="banner-circle-deco2"></div>
        <div class="banner-content">
          <span class="banner-badge">EVENT</span>
          <div class="banner-title">첫 충전 보너스 +5%<br>지금 바로 시작하세요</div>
          <div class="banner-sub">2026.04.01 ~ 2026.04.30</div>
        </div>
      </div>
      <div class="banner-indicator">
        <span class="banner-dot active"></span>
        <span class="banner-dot"></span>
        <span class="banner-dot"></span>
      </div>
    </div>

    <!-- Bottom Spacing -->
    <div style="height:16px;"></div>
  </div>

  <!-- Bottom TabBar (3-tab) -->
  <nav class="tabbar">
    <button class="tab-item">
      <span data-icon="creditCard" style="width:22px;height:22px;display:inline-flex;color:var(--color-text-description)"></span>
      <span class="tab-label">결제내역</span>
    </button>
    <button class="tab-item active">
      <div class="tab-center-icon">
        <span data-icon="home" style="width:24px;height:24px;display:inline-flex;color:var(--color-white)"></span>
      </div>
      <span class="tab-label" style="color:var(--color-primary);">홈</span>
    </button>
    <button class="tab-item">
      <span data-icon="moreHorizontal" style="width:22px;height:22px;display:inline-flex;color:var(--color-text-description)"></span>
      <span class="tab-label">더보기</span>
    </button>
  </nav>

  <script src="../../../icons.js"></script>
</body>
</html>
