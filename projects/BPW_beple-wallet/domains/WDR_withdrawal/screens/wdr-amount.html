<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>출금 금액</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      /* Local variables for display text */
      --display-font-size: 36px;
      --display-letter-spacing: -1px;

      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 0;
      overflow-y: auto;
    }

    /* Balance */
    .balance-row {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      text-align: center;
      margin-bottom: 24px;
    }
    .balance-row strong {
      color: var(--color-text-body);
      font-weight: 600;
    }

    /* Amount display */
    .amount-display {
      text-align: center;
      margin-bottom: 8px;
    }
    .amount-input {
      font-size: var(--display-font-size);
      font-weight: 700;
      color: var(--color-text-heading);
      letter-spacing: var(--display-letter-spacing);
    }
    .amount-input .unit {
      font-size: var(--text-title-lg-size);
      font-weight: 600;
      color: var(--color-text-description);
      margin-left: 4px;
    }
    .amount-cursor {
      display: inline-block;
      width: 2px;
      height: var(--display-font-size);
      background: var(--color-primary);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Underline */
    .amount-underline {
      height: 2px;
      background: var(--color-primary);
      width: 60%;
      margin: 8px auto 8px;
      border-radius: 1px;
      transition: background 0.2s;
    }
    .amount-underline.error {
      background: var(--color-error);
    }

    /* Error message */
    .error-msg {
      font-size: var(--text-body-xs-size);
      color: var(--color-error);
      text-align: center;
      min-height: 16px;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* Quick amount buttons */
    .quick-btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .quick-btn {
      height: var(--btn-sm-height);
      background: transparent;
      color: var(--color-primary);
      border: 1.5px solid var(--color-primary);
      border-radius: var(--radius-md);
      font-size: var(--btn-sm-font-size);
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .quick-btn:active {
      background: var(--color-blue-100);
    }

    /* Info text */
    .info-text {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      text-align: center;
      padding: 12px 16px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      line-height: 1.5;
    }

    /* Footer */
    .footer {
      padding: 16px;
      flex-shrink: 0;
      margin-top: auto;
    }
    .btn-primary {
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled {
      background: var(--color-gray-500);
      color: var(--color-white);
      cursor: not-allowed;
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">출금 금액</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Balance -->
    <div class="balance-row">
      현재 잔액: <strong id="balanceDisplay">&#8361;125,000</strong>
    </div>

    <!-- Amount display -->
    <div class="amount-display">
      <span class="amount-input"><span id="amountValue">0</span><span class="amount-cursor"></span><span class="unit">원</span></span>
    </div>
    <div class="amount-underline" id="amountUnderline"></div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Quick amount buttons -->
    <div class="quick-btns">
      <button class="quick-btn" data-add="10000">+1만</button>
      <button class="quick-btn" data-add="50000">+5만</button>
      <button class="quick-btn" data-add="100000">+10만</button>
      <button class="quick-btn" data-add="all">전액</button>
    </div>

    <!-- Info text -->
    <div class="info-text">
      최소 1만원 · 최대 50만원 · 1만원 단위
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary" id="nextBtn" disabled>다음</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    (function() {
      var BALANCE = 125000;
      var MIN = 10000;
      var MAX = 500000;
      var UNIT = 10000;

      var currentAmount = 0;
      var amountValue = document.getElementById('amountValue');
      var errorMsg = document.getElementById('errorMsg');
      var nextBtn = document.getElementById('nextBtn');
      var underline = document.getElementById('amountUnderline');
      var quickBtns = document.querySelectorAll('.quick-btn');

      function formatNumber(n) {
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      function validate() {
        var amount = currentAmount;
        amountValue.textContent = formatNumber(amount);

        if (amount === 0) {
          errorMsg.textContent = '';
          underline.classList.remove('error');
          nextBtn.disabled = true;
          return;
        }

        if (amount < MIN) {
          errorMsg.textContent = '1만원 이상 입력해주세요';
          underline.classList.add('error');
          nextBtn.disabled = true;
          return;
        }

        if (amount > MAX) {
          errorMsg.textContent = '최대 50만원까지 출금할 수 있습니다';
          underline.classList.add('error');
          nextBtn.disabled = true;
          return;
        }

        if (amount % UNIT !== 0) {
          errorMsg.textContent = '1만원 단위로 입력해주세요';
          underline.classList.add('error');
          nextBtn.disabled = true;
          return;
        }

        if (amount > BALANCE) {
          errorMsg.textContent = '잔액이 부족합니다';
          underline.classList.add('error');
          nextBtn.disabled = true;
          return;
        }

        errorMsg.textContent = '';
        underline.classList.remove('error');
        nextBtn.disabled = false;
      }

      quickBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var addVal = btn.getAttribute('data-add');
          if (addVal === 'all') {
            /* "전액" rounds down to nearest UNIT, capped at MAX */
            var allAmount = Math.floor(BALANCE / UNIT) * UNIT;
            currentAmount = Math.min(allAmount, MAX);
          } else {
            currentAmount = currentAmount + parseInt(addVal, 10);
          }
          validate();
        });
      });

      /* Initial state */
      validate();
    })();
  </script>
</body>
</html>
