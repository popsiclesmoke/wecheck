<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>출금 완료</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Content — full height, center aligned (no TopBar per design-spec WDR-004) */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 0;
    }

    /* State icon */
    .state-icon {
      width: var(--state-icon-size);
      height: var(--state-icon-size);
      background: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--state-gap-icon-msg);
    }
    .state-icon svg { color: var(--color-white); }

    /* Headline */
    .headline {
      font-size: var(--text-headline-size);
      font-weight: var(--text-headline-weight);
      color: var(--color-text-heading);
      margin-bottom: var(--state-gap-msg-desc);
      text-align: center;
    }

    /* Amount */
    .amount-value {
      font-size: var(--text-title-2xl-size);
      font-weight: var(--text-title-2xl-weight);
      color: var(--color-primary);
      margin-bottom: 8px;
      text-align: center;
    }

    /* Subtitle */
    .subtitle {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      text-align: center;
      margin-bottom: var(--state-gap-desc-btn);
    }

    /* ATM info */
    .atm-info {
      text-align: center;
      margin-bottom: var(--state-gap-desc-btn);
    }
    .atm-name {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 4px;
    }
    .atm-datetime {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-disabled);
    }

    /* Balance card */
    .balance-card {
      width: 100%;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--state-gap-desc-btn);
    }
    .balance-label {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
    }
    .balance-amount {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-title);
    }

    /* Notice */
    .notice {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      text-align: center;
      padding: 10px 16px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      width: 100%;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      padding: 16px;
      flex-shrink: 0;
    }
    .btn-primary {
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Content — centered layout without TopBar (design-spec WDR-004) -->
  <div class="content">
    <!-- Success icon -->
    <div class="state-icon">
      <span data-icon="check" style="width:32px;height:32px;display:inline-flex;color:var(--color-white)"></span>
    </div>

    <!-- Headline -->
    <div class="headline">출금이 완료됐습니다</div>

    <!-- Amount -->
    <div class="amount-value">₩50,000</div>

    <!-- Subtitle -->
    <div class="subtitle">ATM에서 현금을 수령해주세요</div>

    <!-- ATM info -->
    <div class="atm-info">
      <div class="atm-name">KB국민은행 ATM · 강남역 2번 출구</div>
      <div class="atm-datetime">2026.04.16 · 15:10</div>
    </div>

    <!-- Balance card -->
    <div class="balance-card">
      <span class="balance-label">남은 Beple Money</span>
      <span class="balance-amount">₩75,000</span>
    </div>

    <!-- Notice -->
    <div class="notice">ATM에서 현금이 나오지 않은 경우 고객센터로 문의해주세요.</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary">홈으로</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
