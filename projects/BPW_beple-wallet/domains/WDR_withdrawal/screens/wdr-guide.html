<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>WDR-005 ATM 출금 안내</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex; flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px; display: flex; align-items: center;
      padding: 0 16px;
      flex-shrink: 0; background: var(--color-bg);
    }
    .back-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--color-text-heading);
      border-radius: var(--radius-md); margin-left: -8px;
    }
    .back-btn:hover { background: var(--color-bg-content-1); }
    .topbar-title {
      flex: 1;
      font-size: var(--text-title-md-size); font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      margin-left: 4px;
    }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 24px 16px 24px; }

    /* Illustration */
    .illustration {
      width: 100%; height: 160px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-2xl);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      overflow: hidden;
    }
    .illustration-inner {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .atm-icon-box {
      width: 72px; height: 72px; border-radius: var(--radius-2xl);
      background: linear-gradient(135deg, var(--color-blue-200), var(--color-primary));
      display: flex; align-items: center; justify-content: center;
    }
    .atm-icon-box svg {
      width: 40px; height: 40px;
    }
    .atm-label {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      font-weight: 500;
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 8px;
    }
    .page-sub {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* Guide steps */
    .guide-steps { display: flex; flex-direction: column; gap: 0; }
    .guide-step-row {
      display: flex; gap: 16px;
      position: relative;
    }
    .step-left {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0;
    }
    .step-num-circle {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--color-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-body-sm-size); font-weight: 700; color: var(--color-bg);
      flex-shrink: 0;
    }
    .step-line {
      width: 2px; flex: 1;
      background: var(--color-border-card);
      margin: 4px 0;
      min-height: 24px;
    }
    .guide-step-row:last-child .step-line { display: none; }
    .step-right {
      padding-bottom: 24px;
      flex: 1;
      padding-top: 4px;
      min-width: 0;
    }
    .step-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }
    .step-desc {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.5;
    }

    /* Info card */
    .info-card {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 16px;
      background: var(--color-blue-100);
      border-radius: var(--radius-lg);
      margin-top: 4px;
    }
    .info-card-icon {
      width: 16px; height: 16px;
      color: var(--color-primary);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .info-card-text {
      font-size: var(--text-body-sm-size);
      color: var(--color-primary);
      font-weight: 500;
      line-height: 1.4;
      min-width: 0;
    }

    /* Footer */
    .footer { padding: 16px 16px 32px; flex-shrink: 0; }
    .btn-primary {
      width: 100%; height: var(--btn-xl-height);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">ATM 출금 안내</span>
  </div>

  <div class="content">
    <!-- Illustration -->
    <div class="illustration">
      <div class="illustration-inner">
        <div class="atm-icon-box">
          <svg viewBox="0 0 40 40" fill="none">
            <rect x="8" y="6" width="24" height="28" rx="3" stroke="var(--color-bg)" stroke-width="2.2"/>
            <rect x="12" y="10" width="16" height="10" rx="1.5" fill="var(--color-bg)" fill-opacity="0.3"/>
            <rect x="13" y="24" width="4" height="3" rx="0.8" fill="var(--color-bg)" fill-opacity="0.5"/>
            <rect x="18" y="24" width="4" height="3" rx="0.8" fill="var(--color-bg)" fill-opacity="0.5"/>
            <rect x="23" y="24" width="4" height="3" rx="0.8" fill="var(--color-bg)" fill-opacity="0.5"/>
            <rect x="13" y="28" width="4" height="3" rx="0.8" fill="var(--color-bg)" fill-opacity="0.5"/>
            <rect x="18" y="28" width="4" height="3" rx="0.8" fill="var(--color-bg)" fill-opacity="0.5"/>
            <rect x="23" y="28" width="4" height="3" rx="0.8" fill="var(--color-bg)" fill-opacity="0.5"/>
          </svg>
        </div>
        <span class="atm-label">ATM 출금</span>
      </div>
    </div>

    <p class="page-title">ATM에서 이렇게 진행하세요</p>
    <p class="page-sub">편의점 또는 은행 ATM에서 간편하게 현금을 출금할 수 있습니다</p>

    <!-- Guide steps -->
    <div class="guide-steps">
      <div class="guide-step-row">
        <div class="step-left">
          <div class="step-num-circle">1</div>
          <div class="step-line"></div>
        </div>
        <div class="step-right">
          <div class="step-title">ATM에서 "QR 출금" 선택</div>
          <div class="step-desc">편의점 ATM 또는 은행 ATM에서 QR 출금 메뉴를 선택하세요</div>
        </div>
      </div>
      <div class="guide-step-row">
        <div class="step-left">
          <div class="step-num-circle">2</div>
          <div class="step-line"></div>
        </div>
        <div class="step-right">
          <div class="step-title">ATM 화면에 QR 코드가 표시됩니다</div>
          <div class="step-desc">ATM 화면에 표시된 QR 코드를 확인하세요</div>
        </div>
      </div>
      <div class="guide-step-row">
        <div class="step-left">
          <div class="step-num-circle">3</div>
          <div class="step-line"></div>
        </div>
        <div class="step-right">
          <div class="step-title">비플월렛으로 QR을 스캔하세요</div>
          <div class="step-desc">아래 버튼을 눌러 QR 코드를 스캔하면 출금이 진행됩니다</div>
        </div>
      </div>
    </div>

    <!-- Info card -->
    <div class="info-card">
      <div class="info-card-icon">
        <span data-icon="infoCircle" style="width:16px;height:16px;display:inline-flex"></span>
      </div>
      <span class="info-card-text">1회 최대 50만원, 1일 최대 200만원</span>
    </div>
  </div>

  <div class="footer">
    <button class="btn-primary" onclick="location.href='wdr-qr.html'">QR 스캔하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
