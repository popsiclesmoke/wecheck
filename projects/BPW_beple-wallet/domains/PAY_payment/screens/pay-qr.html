<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>QR 결제</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-gray-900);
      color: var(--color-white);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      background: var(--color-gray-900);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .close-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-white);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-white);
    }

    /* Camera area */
    .camera-area {
      flex: 1;
      position: relative;
      background: var(--color-gray-900);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* QR guide frame */
    .qr-frame {
      width: 220px;
      height: 220px;
      position: relative;
    }
    .qr-frame::before,
    .qr-frame::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
    }
    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
    }
    .corner-tl {
      top: 0; left: 0;
      border-top: 3px solid var(--color-white);
      border-left: 3px solid var(--color-white);
      border-radius: var(--radius-sm) 0 0 0;
    }
    .corner-tr {
      top: 0; right: 0;
      border-top: 3px solid var(--color-white);
      border-right: 3px solid var(--color-white);
      border-radius: 0 var(--radius-sm) 0 0;
    }
    .corner-bl {
      bottom: 0; left: 0;
      border-bottom: 3px solid var(--color-white);
      border-left: 3px solid var(--color-white);
      border-radius: 0 0 0 var(--radius-sm);
    }
    .corner-br {
      bottom: 0; right: 0;
      border-bottom: 3px solid var(--color-white);
      border-right: 3px solid var(--color-white);
      border-radius: 0 0 var(--radius-sm) 0;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--color-blue-400), transparent);
      top: 50%;
      animation: scanMove 2s ease-in-out infinite;
    }
    @keyframes scanMove {
      0%   { top: 10%; }
      50%  { top: 90%; }
      100% { top: 10%; }
    }

    /* Guide text overlay */
    .guide-text {
      position: absolute;
      bottom: 120px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: var(--text-body-lg-size);
      font-weight: var(--text-body-lg-weight);
      color: var(--color-white);
      padding: 0 24px;
    }

    /* Dimmed overlay strips — using dimmed tokens */
    .overlay-top,
    .overlay-bottom,
    .overlay-left,
    .overlay-right {
      position: absolute;
      background: var(--dimmed-bg);
      opacity: var(--dimmed-opacity);
    }
    .overlay-top    { top: 0; left: 0; right: 0; height: calc(50% - 110px); }
    .overlay-bottom { bottom: 80px; left: 0; right: 0; height: calc(50% - 110px); }
    .overlay-left   { top: calc(50% - 110px); left: 0; width: calc(50% - 110px); height: 220px; }
    .overlay-right  { top: calc(50% - 110px); right: 0; width: calc(50% - 110px); height: 220px; }

    /* Flash strip */
    .flash-strip {
      height: 100px;
      background: var(--color-gray-900);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-top: 1px solid color-mix(in srgb, var(--color-white) 10%, transparent);
    }
    .flash-btn {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--color-white) 10%, transparent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: var(--color-white);
    }
    .flash-btn svg {
      width: 28px;
      height: 28px;
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="close-btn" aria-label="닫기">
      <span data-icon="close" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">QR 결제</span>
  </div>

  <!-- Camera Area -->
  <div class="camera-area">
    <!-- Dimmed overlays -->
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>
    <div class="overlay-left"></div>
    <div class="overlay-right"></div>

    <!-- QR Guide Frame -->
    <div class="qr-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line"></div>
    </div>

    <!-- Guide text -->
    <div class="guide-text">가맹점 QR 코드를 스캔해주세요</div>
  </div>

  <!-- Flash Strip -->
  <div class="flash-strip">
    <button class="flash-btn" aria-label="플래시 켜기">
      <span data-icon="flash" style="width:28px;height:28px;display:inline-flex"></span>
    </button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
