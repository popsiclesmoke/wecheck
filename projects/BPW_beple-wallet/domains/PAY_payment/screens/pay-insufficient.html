<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>잔액 부족</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* === Background screen (blurred) === */
    .bg-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      filter: blur(3px);
      pointer-events: none;
    }
    .bg-topbar {
      height: 56px;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border-card);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
    }
    .bg-back {
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-heading);
    }
    .bg-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }
    .bg-content {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .bg-merchant {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
    }
    .bg-merchant-icon {
      width: 44px;
      height: 44px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
    }
    .bg-merchant-text { display: flex; flex-direction: column; gap: 4px; }
    .bg-merchant-name { width: 100px; height: 14px; background: var(--color-gray-400); border-radius: 4px; }
    .bg-merchant-cat  { width: 60px;  height: 10px; background: var(--color-gray-300); border-radius: 4px; }
    .bg-amount {
      text-align: center;
      padding: 16px 0;
    }
    .bg-amount-label { width: 60px; height: 12px; background: var(--color-gray-300); border-radius: 4px; margin: 0 auto 8px; }
    .bg-amount-val   { width: 100px; height: 28px; background: var(--color-blue-200); border-radius: 4px; margin: 0 auto; }
    .bg-divider { height: 1px; background: var(--color-border-divider); }

    /* === Dimmed overlay === */
    .dimmed {
      position: absolute;
      inset: 0;
      background: var(--dimmed-bg);
      opacity: var(--dimmed-opacity);
      z-index: 10;
    }

    /* === Modal popup === */
    .popup-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .popup {
      width: var(--popup-width);
      background: var(--color-bg);
      border-radius: var(--popup-radius);
      box-shadow: var(--popup-shadow);
      padding: var(--popup-padding-top) var(--popup-padding-x) var(--popup-padding-bottom);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Warning icon */
    .warning-icon {
      width: var(--state-icon-size);
      height: var(--state-icon-size);
      background: var(--color-warning);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--state-gap-icon-msg);
    }
    .warning-icon svg {
      color: var(--color-white);
    }

    /* Popup title */
    .popup-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      text-align: center;
      margin-bottom: var(--state-gap-msg-desc);
    }

    /* Popup body */
    .popup-body {
      width: 100%;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-bottom: var(--popup-gap-content-btn);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .popup-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .popup-info-label {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
    }
    .popup-info-value {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-title);
    }
    .popup-info-value.short {
      color: var(--color-error);
    }

    /* Buttons */
    .popup-btns {
      display: flex;
      gap: var(--alert-btn-gap);
      width: 100%;
    }
    .btn-ghost-lg {
      flex: 1;
      height: var(--btn-lg-height);
      background: transparent;
      color: var(--color-primary);
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-lg);
      font-size: var(--btn-lg-font-size);
      font-weight: var(--text-title-sm-weight);
      cursor: pointer;
    }
    .btn-primary-lg {
      flex: 1;
      height: var(--btn-lg-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--btn-lg-font-size);
      font-weight: var(--text-title-sm-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Background screen (blurred) -->
  <div class="bg-screen" aria-hidden="true">
    <div class="bg-topbar">
      <div class="bg-back">
        <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
      </div>
      <span class="bg-title">결제 확인</span>
    </div>
    <div class="bg-content">
      <div class="bg-merchant">
        <div class="bg-merchant-icon"></div>
        <div class="bg-merchant-text">
          <div class="bg-merchant-name"></div>
          <div class="bg-merchant-cat"></div>
        </div>
      </div>
      <div class="bg-amount">
        <div class="bg-amount-label"></div>
        <div class="bg-amount-val"></div>
      </div>
      <div class="bg-divider"></div>
    </div>
  </div>

  <!-- Dimmed overlay -->
  <div class="dimmed" aria-hidden="true"></div>

  <!-- Popup -->
  <div class="popup-wrapper" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <div class="popup">
      <!-- Warning icon -->
      <div class="warning-icon">
        <span data-icon="alertTriangle" style="width:32px;height:32px;display:inline-flex;color:var(--color-white)"></span>
      </div>

      <!-- Title -->
      <div class="popup-title" id="popup-title">잔액이 부족합니다</div>

      <!-- Body info -->
      <div class="popup-body">
        <div class="popup-info-row">
          <span class="popup-info-label">현재 잔액</span>
          <span class="popup-info-value short">₩3,000</span>
        </div>
        <div class="popup-info-row">
          <span class="popup-info-label">필요 금액</span>
          <span class="popup-info-value">₩5,500</span>
        </div>
      </div>

      <!-- Buttons -->
      <div class="popup-btns">
        <button class="btn-ghost-lg">취소</button>
        <button class="btn-primary-lg">충전하기</button>
      </div>
    </div>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
