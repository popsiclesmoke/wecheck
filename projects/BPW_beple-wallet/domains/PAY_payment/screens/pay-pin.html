<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>PIN 입력</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }

    /* Content */
    .content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 0;
    }

    /* Page Title */
    .page-title {
      font-size: var(--text-title-lg-size);
      font-weight: var(--text-title-lg-weight);
      color: var(--color-text-heading);
      text-align: center;
      margin-bottom: 16px;
    }

    /* Payment Summary */
    .payment-summary {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 32px;
    }
    .summary-merchant {
      font-size: var(--text-body-sm-size);
      font-weight: var(--text-body-sm-weight);
      color: var(--color-text-body);
    }
    .summary-amount {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-primary);
    }

    /* PIN Dots */
    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }
    .pin-dot.error {
      background: var(--color-error);
      border-color: var(--color-error);
    }

    /* Error message */
    .error-msg {
      font-size: var(--text-body-xs-size);
      font-weight: var(--text-body-xs-weight);
      color: var(--color-error);
      text-align: center;
      height: 16px;
      line-height: 16px;
      margin-bottom: 8px;
    }

    /* Lock message */
    .lock-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 360px;
      height: 800px;
      background: var(--color-bg);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .lock-overlay.show {
      display: flex;
    }
    .lock-icon {
      width: 64px;
      height: 64px;
      color: var(--color-error);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lock-title {
      font-size: var(--text-headline-size);
      font-weight: var(--text-headline-weight);
      color: var(--color-text-heading);
      text-align: center;
    }
    .lock-desc {
      font-size: var(--text-body-sm-size);
      font-weight: var(--text-body-sm-weight);
      color: var(--color-text-description);
      text-align: center;
      padding: 0 32px;
    }

    /* Shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 50%, 90% { transform: translateX(-6px); }
      30%, 70% { transform: translateX(6px); }
    }
    .pin-dots.shake {
      animation: shake 0.4s ease-in-out;
    }

    /* Numpad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--color-border-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      flex-shrink: 0;
      width: 100%;
      --numpad-key-height: 64px;
    }
    .numpad-key {
      background: var(--color-bg);
      border: none;
      height: var(--numpad-key-height);
      font-family: var(--text-font-family);
      font-size: var(--text-title-lg-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .numpad-key:active {
      background: var(--color-bg-content-1);
    }
    .numpad-key.empty {
      background: var(--color-bg-content-2);
      cursor: default;
    }
    .numpad-key.del {
      background: var(--color-bg-content-2);
      color: var(--color-text-body);
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">PIN 입력</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Page Title -->
    <div class="page-title">결제를 위해 PIN을 입력해주세요</div>

    <!-- Payment Summary -->
    <div class="payment-summary">
      <span class="summary-merchant">스타벅스 강남점</span>
      <span class="summary-amount">₩5,500</span>
    </div>

    <!-- PIN Dots -->
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Numpad -->
  <div class="numpad" id="numpad">
    <button class="numpad-key" data-key="1">1</button>
    <button class="numpad-key" data-key="2">2</button>
    <button class="numpad-key" data-key="3">3</button>
    <button class="numpad-key" data-key="4">4</button>
    <button class="numpad-key" data-key="5">5</button>
    <button class="numpad-key" data-key="6">6</button>
    <button class="numpad-key" data-key="7">7</button>
    <button class="numpad-key" data-key="8">8</button>
    <button class="numpad-key" data-key="9">9</button>
    <button class="numpad-key empty"></button>
    <button class="numpad-key" data-key="0">0</button>
    <button class="numpad-key del" data-key="del" aria-label="지우기">
      <span data-icon="backspace" style="width:22px;height:22px;display:inline-flex"></span>
    </button>
  </div>

  <!-- Lock Overlay -->
  <div class="lock-overlay" id="lockOverlay">
    <div class="lock-icon">
      <span data-icon="lock" style="width:64px;height:64px;display:inline-flex"></span>
    </div>
    <div class="lock-title">PIN이 잠겼습니다</div>
    <div class="lock-desc">5회 연속 오류로 PIN이 잠겼습니다. 고객센터에 문의해주세요.</div>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    (function() {
      var CORRECT_PIN = '123456';
      var MAX_ATTEMPTS = 5;

      var pin = '';
      var failCount = 0;
      var locked = false;
      var processing = false;

      var dots = document.querySelectorAll('#pinDots .pin-dot');
      var pinDotsEl = document.getElementById('pinDots');
      var errorMsg = document.getElementById('errorMsg');
      var numpad = document.getElementById('numpad');
      var lockOverlay = document.getElementById('lockOverlay');

      function updateDots() {
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.toggle('filled', i < pin.length);
          dots[i].classList.remove('error');
        }
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.add('error');
          dots[i].classList.remove('filled');
        }
        pinDotsEl.classList.add('shake');
        setTimeout(function() {
          pinDotsEl.classList.remove('shake');
        }, 400);
      }

      function showLock() {
        locked = true;
        lockOverlay.classList.add('show');
      }

      function handleKey(key) {
        if (locked || processing) return;

        if (key === 'del') {
          if (pin.length > 0) {
            pin = pin.slice(0, -1);
            errorMsg.textContent = '';
            updateDots();
          }
          return;
        }

        if (pin.length >= 6) return;

        pin += key;
        updateDots();

        if (pin.length === 6) {
          processing = true;
          setTimeout(function() {
            if (pin === CORRECT_PIN) {
              location.href = 'pay-complete.html';
            } else {
              failCount++;
              if (failCount >= MAX_ATTEMPTS) {
                showLock();
              } else {
                showError('PIN이 일치하지 않습니다 (' + failCount + '/' + MAX_ATTEMPTS + ')');
                pin = '';
                setTimeout(function() {
                  updateDots();
                  processing = false;
                }, 500);
              }
            }
          }, 300);
        }
      }

      numpad.addEventListener('click', function(e) {
        var btn = e.target.closest('.numpad-key');
        if (!btn || btn.classList.contains('empty')) return;
        var key = btn.dataset.key;
        if (key) handleKey(key);
      });
    })();
  </script>
</body>
</html>
