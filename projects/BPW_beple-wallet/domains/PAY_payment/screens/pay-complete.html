<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>결제 완료</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Content — full height, center aligned (no TopBar per design-spec PAY-003) */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 0;
    }

    /* State icon */
    .state-icon {
      width: var(--state-icon-size);
      height: var(--state-icon-size);
      background: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--state-gap-icon-msg);
    }
    .state-icon svg {
      color: var(--color-white);
    }

    /* Headline */
    .headline {
      font-size: var(--text-headline-size);
      font-weight: var(--text-headline-weight);
      color: var(--color-text-heading);
      margin-bottom: var(--state-gap-msg-desc);
      text-align: center;
    }

    /* Amount */
    .amount-value {
      font-size: var(--text-title-2xl-size);
      font-weight: var(--text-title-2xl-weight);
      color: var(--color-primary);
      margin-bottom: 12px;
      text-align: center;
    }

    /* Merchant + datetime */
    .transaction-info {
      text-align: center;
      margin-bottom: var(--state-gap-desc-btn);
    }
    .transaction-merchant {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 4px;
    }
    .transaction-datetime {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-disabled);
    }

    /* Balance card */
    .balance-card {
      width: 100%;
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--state-gap-desc-btn);
    }
    .balance-label {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
    }
    .balance-amount {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-title);
    }

    /* Footer */
    .footer {
      padding: 16px;
      flex-shrink: 0;
    }
    .btn-primary {
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Content — centered layout without TopBar (design-spec PAY-003) -->
  <div class="content">
    <!-- Success icon -->
    <div class="state-icon">
      <span data-icon="check" style="width:32px;height:32px;display:inline-flex;color:var(--color-white)"></span>
    </div>

    <!-- Headline -->
    <div class="headline">결제가 완료됐습니다</div>

    <!-- Amount -->
    <div class="amount-value">₩5,500</div>

    <!-- Transaction info -->
    <div class="transaction-info">
      <div class="transaction-merchant">스타벅스 강남점</div>
      <div class="transaction-datetime">2026.04.16 · 14:32</div>
    </div>

    <!-- Balance card -->
    <div class="balance-card">
      <span class="balance-label">남은 Beple Money</span>
      <span class="balance-amount">₩119,500</span>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary" onclick="goHome()">홈으로</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    function goHome() {
      history.replaceState(null, '', 'hom-main.html');
      location.href = '../HOM_home/screens/hom-main.html';
    }
  </script>
</body>
</html>
