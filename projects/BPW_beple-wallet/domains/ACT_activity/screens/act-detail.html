<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>거래 상세</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    :root {
      --color-state-complete-bg: color-mix(in srgb, var(--color-mint-500) 12%, transparent);
      --color-state-cancel-bg: color-mix(in srgb, var(--color-red-500) 10%, transparent);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      margin-bottom: 16px;
    }
    .status-badge.complete {
      background: var(--color-state-complete-bg);
      color: var(--color-mint-500);
    }
    .status-badge.cancel {
      background: var(--color-state-cancel-bg);
      color: var(--color-red-500);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Transaction type icon */
    .tx-icon-lg {
      width: 56px;
      height: 56px;
      background: var(--color-bg-content-1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-body);
      margin-bottom: 12px;
    }

    /* Amount */
    .amount-value {
      font-size: var(--text-title-2xl-size);
      font-weight: var(--text-title-2xl-weight);
      color: var(--color-text-heading);
      margin-bottom: 6px;
      text-align: center;
    }
    .amount-value.minus { color: var(--color-text-heading); }
    .amount-value.plus  { color: var(--color-mint-500); }

    /* Merchant name */
    .tx-merchant {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 24px;
      text-align: center;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--color-border-card);
      margin-bottom: 20px;
    }

    /* Detail table */
    .detail-table {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border-card);
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      flex-shrink: 0;
      min-width: 80px;
    }
    .detail-value {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-title);
      text-align: right;
      font-weight: 400;
    }
    .detail-value.mono {
      font-variant-numeric: tabular-nums;
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
    }

    /* Footer */
    .footer {
      padding: 16px;
      flex-shrink: 0;
    }
    .btn-ghost {
      width: 100%;
      height: var(--btn-xl-height);
      background: transparent;
      color: var(--color-primary);
      border: 1.5px solid var(--color-primary);
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex;color:currentColor"></span>
    </button>
    <span class="topbar-title">거래 상세</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Status badge -->
    <div class="status-badge complete">
      <span class="status-dot"></span>
      완료
    </div>

    <!-- Transaction icon -->
    <div class="tx-icon-lg">
      <span data-icon="shoppingBag" style="width:26px;height:26px;display:inline-flex;color:currentColor"></span>
    </div>

    <!-- Amount -->
    <div class="amount-value minus">-&#8361;5,500</div>

    <!-- Merchant -->
    <div class="tx-merchant">스타벅스 강남점 결제</div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Detail table -->
    <div class="detail-table">
      <div class="detail-row">
        <span class="detail-label">거래 유형</span>
        <span class="detail-value">QR 결제</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">날짜/시간</span>
        <span class="detail-value">2026.04.16 14:32:08</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">결제 수단</span>
        <span class="detail-value">Beple Money</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">가맹점</span>
        <span class="detail-value">스타벅스 강남점</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">수수료</span>
        <span class="detail-value">없음</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">처리 번호</span>
        <span class="detail-value mono">TXN-2604-8821-9301</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-ghost">영수증 저장</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
