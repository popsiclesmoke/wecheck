<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>계좌 관리</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Section title */
    .section-title {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      margin-bottom: 8px;
      padding-left: 4px;
    }

    /* Account list */
    .account-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Account item */
    .account-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--color-bg);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
    }
    .bank-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-title-xs-size);
      font-weight: 700;
      color: var(--color-white);
      flex-shrink: 0;
    }
    .bank-circle.shinhan  { background: var(--color-blue-500); }
    .bank-circle.kb       { background: var(--color-yellow-500); }
    .bank-circle.woori    { background: var(--color-mint-500); }
    .bank-circle.hana     { background: var(--color-blue-400); }
    .bank-circle.nonghyup { background: var(--color-blue-300); }
    .bank-circle.ibk      { background: var(--color-mint-200); }

    .account-info { flex: 1; min-width: 0; }
    .bank-name {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-title);
      margin-bottom: 4px;
    }
    .account-number {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      font-variant-numeric: tabular-nums;
    }

    /* Delete button */
    .delete-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--color-error);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--color-border-card);
      margin: 16px 0;
    }

    /* Primary account badge */
    .primary-badge {
      display: inline-flex;
      align-items: center;
      background: var(--color-blue-100);
      color: var(--color-primary);
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      margin-top: 4px;
    }

    /* Empty State */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 24px;
      text-align: center;
    }
    .empty-state.show {
      display: flex;
    }
    .empty-illustration {
      width: 120px;
      height: 120px;
      border-radius: var(--radius-2xl);
      background: var(--color-gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .empty-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-title);
      margin-bottom: 8px;
    }
    .empty-desc {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.5;
    }

    /* Data state wrapper */
    .data-state {
      display: block;
    }
    .data-state.hide {
      display: none;
    }

    /* Footer */
    .footer {
      padding: 16px;
      flex-shrink: 0;
    }
    .btn-primary {
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
    }

    /* ── Delete Confirm Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 360px; height: 800px;
      background: var(--dimmed-bg);
      opacity: var(--dimmed-opacity);
      z-index: 200;
    }
    .modal-overlay.show {
      display: block;
    }
    .modal-card {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: var(--alert-width);
      background: var(--color-bg);
      border-radius: var(--popup-radius);
      box-shadow: var(--popup-shadow);
      z-index: 201;
      padding: var(--popup-padding-top) var(--alert-padding-x) var(--popup-padding-bottom);
      text-align: center;
    }
    .modal-card.show {
      display: block;
    }
    .modal-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      margin-bottom: var(--popup-gap-content-btn);
    }
    .modal-actions {
      display: flex;
      gap: var(--alert-btn-gap);
    }
    .modal-btn {
      flex: 1;
      height: var(--btn-lg-height);
      border-radius: var(--btn-lg-radius);
      font-size: var(--btn-lg-font-size);
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .modal-btn.secondary {
      background: var(--color-bg-content-1);
      color: var(--color-text-body);
    }
    .modal-btn.danger {
      background: var(--color-error);
      color: var(--color-white);
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex;color:currentColor"></span>
    </button>
    <span class="topbar-title">계좌 관리</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Data State (visible when accounts exist) -->
    <div class="data-state" id="dataState">
      <div class="section-title" id="sectionTitle">등록된 계좌 2개</div>

      <div class="account-list" id="accountList">
        <!-- Account 1: Shinhan -->
        <div class="account-item" data-account="shinhan">
          <div class="bank-circle shinhan">신한</div>
          <div class="account-info">
            <div class="bank-name">신한은행</div>
            <div class="account-number">110-123-****56</div>
            <div class="primary-badge">대표 계좌</div>
          </div>
          <button class="delete-btn" aria-label="삭제">
            <span data-icon="trash" style="width:18px;height:18px;display:inline-flex;color:currentColor"></span>
          </button>
        </div>

        <!-- Account 2: KB -->
        <div class="account-item" data-account="kb">
          <div class="bank-circle kb">KB</div>
          <div class="account-info">
            <div class="bank-name">KB국민은행</div>
            <div class="account-number">012-345-****78</div>
          </div>
          <button class="delete-btn" aria-label="삭제">
            <span data-icon="trash" style="width:18px;height:18px;display:inline-flex;color:currentColor"></span>
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Info notice -->
      <div style="font-size: var(--text-body-xs-size); color: var(--color-text-description); padding: 0 4px; line-height: 1.6;">
        최대 5개의 계좌를 등록할 수 있습니다.<br>
        대표 계좌는 충전 시 기본으로 사용됩니다.
      </div>
    </div>

    <!-- Empty State (visible when no accounts) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-illustration">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--color-gray-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
      </div>
      <div class="empty-title">등록된 계좌가 없습니다</div>
      <div class="empty-desc">계좌를 등록하면 충전과 출금을<br>더 편리하게 이용할 수 있어요.</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary">계좌 등록하기</button>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal-card" id="modalCard">
    <div class="modal-title">계좌를 삭제하시겠습니까?</div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modalCancel">취소</button>
      <button class="modal-btn danger" id="modalDelete">삭제</button>
    </div>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    (function() {
      var overlay = document.getElementById('modalOverlay');
      var card = document.getElementById('modalCard');
      var cancelBtn = document.getElementById('modalCancel');
      var deleteBtn = document.getElementById('modalDelete');
      var dataState = document.getElementById('dataState');
      var emptyState = document.getElementById('emptyState');
      var accountList = document.getElementById('accountList');
      var sectionTitle = document.getElementById('sectionTitle');

      var targetItem = null;

      function openModal(item) {
        targetItem = item;
        overlay.classList.add('show');
        card.classList.add('show');
      }

      function closeModal() {
        targetItem = null;
        overlay.classList.remove('show');
        card.classList.remove('show');
      }

      function updateState() {
        var remaining = accountList.querySelectorAll('.account-item');
        if (remaining.length === 0) {
          dataState.classList.add('hide');
          emptyState.classList.add('show');
        } else {
          sectionTitle.textContent = '등록된 계좌 ' + remaining.length + '개';
        }
      }

      /* Delegate click on delete buttons */
      accountList.addEventListener('click', function(e) {
        var btn = e.target.closest('.delete-btn');
        if (!btn) return;
        var item = btn.closest('.account-item');
        if (item) openModal(item);
      });

      cancelBtn.addEventListener('click', closeModal);
      overlay.addEventListener('click', closeModal);

      deleteBtn.addEventListener('click', function() {
        if (targetItem) {
          targetItem.remove();
          closeModal();
          updateState();
        }
      });
    })();
  </script>
</body>
</html>
