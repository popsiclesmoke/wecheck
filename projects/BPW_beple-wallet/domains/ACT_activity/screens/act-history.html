<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>거래 내역</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }

    /* Filter area */
    .filter-area {
      flex-shrink: 0;
      border-bottom: 1px solid var(--color-border-card);
    }

    /* Date range picker */
    .date-range-bar {
      padding: 12px 16px 0;
    }
    .date-range-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      height: var(--btn-sm-height);
      padding: 0 12px;
      background: var(--color-bg-content-2);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: inherit;
    }
    .date-range-btn .icon-calendar {
      flex-shrink: 0;
      color: var(--color-text-description);
    }
    .date-range-text {
      font-size: var(--text-body-xs-size);
      font-weight: 400;
      color: var(--color-text-body);
      font-variant-numeric: tabular-nums;
    }
    .date-range-arrow {
      margin-left: auto;
      flex-shrink: 0;
      color: var(--color-text-description);
    }

    /* Filter chips */
    .filter-bar {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      height: var(--btn-sm-height);
      padding: 0 14px;
      border-radius: 999px;
      font-size: var(--text-body-sm-size);
      font-weight: 400;
      border: 1.5px solid var(--color-border-card);
      background: var(--color-bg);
      color: var(--color-text-body);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: var(--color-white);
      font-weight: 600;
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px;
    }

    /* Date group */
    .date-group {
      margin-top: 16px;
    }
    .date-header {
      font-size: var(--text-body-xs-size);
      font-weight: 600;
      color: var(--color-text-description);
      margin-bottom: 8px;
      padding: 0 4px;
    }

    /* Transaction row */
    .tx-row {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 64px;
      padding: 0 4px;
      border-bottom: 1px solid var(--color-border-card);
      cursor: pointer;
    }
    .tx-row:last-child {
      border-bottom: none;
    }

    /* Icon */
    .tx-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tx-icon.charge {
      background: var(--color-blue-100);
      color: var(--color-primary);
    }
    .tx-icon.pay {
      background: var(--color-bg-content-1);
      color: var(--color-text-body);
    }
    .tx-icon.withdraw {
      background: var(--color-bg-content-1);
      color: var(--color-text-body);
    }

    /* Tx info */
    .tx-info {
      flex: 1;
      min-width: 0;
    }
    .tx-name {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-title);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-time {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-disabled);
      margin-top: 2px;
    }

    /* Amount */
    .tx-amount {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tx-amount.plus  { color: var(--color-mint-500); }
    .tx-amount.minus { color: var(--color-text-body); }

    /* Data state wrapper */
    .data-state {
      display: block;
    }
    .data-state.hide {
      display: none;
    }

    /* Empty State */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 24px;
      text-align: center;
    }
    .empty-state.show {
      display: flex;
    }
    .empty-illustration {
      width: 120px;
      height: 120px;
      border-radius: var(--radius-2xl);
      background: var(--color-gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .empty-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-title);
      margin-bottom: 8px;
    }
    .empty-desc {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex;color:currentColor"></span>
    </button>
    <span class="topbar-title">거래 내역</span>
  </div>

  <!-- Filter area -->
  <div class="filter-area">
    <!-- Date range picker -->
    <div class="date-range-bar">
      <button class="date-range-btn" aria-label="날짜 범위 선택">
        <span class="icon-calendar" data-icon="calendar" style="width:16px;height:16px;display:inline-flex;color:var(--color-text-description)"></span>
        <span class="date-range-text">2026.04.01 ~ 2026.04.16</span>
        <span class="date-range-arrow" data-icon="chevronDown" style="width:16px;height:16px;display:inline-flex;color:var(--color-text-description)"></span>
      </button>
    </div>

    <!-- Filter chips -->
    <div class="filter-bar">
      <button class="chip active">전체</button>
      <button class="chip">충전</button>
      <button class="chip">결제</button>
      <button class="chip">출금</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Data State (visible when transactions exist) -->
    <div class="data-state" id="dataState">
      <!-- 2026.04.16 -->
      <div class="date-group">
        <div class="date-header">2026.04.16</div>

        <!-- Charge -->
        <div class="tx-row">
          <div class="tx-icon charge">
            <span data-icon="arrowUp" style="width:20px;height:20px;display:inline-flex;color:currentColor"></span>
          </div>
          <div class="tx-info">
            <div class="tx-name">Korbit 충전</div>
            <div class="tx-time">14:20</div>
          </div>
          <span class="tx-amount plus">+&#8361;50,000</span>
        </div>

        <!-- Payment -->
        <div class="tx-row">
          <div class="tx-icon pay">
            <span data-icon="shoppingBag" style="width:20px;height:20px;display:inline-flex;color:currentColor"></span>
          </div>
          <div class="tx-info">
            <div class="tx-name">스타벅스 결제</div>
            <div class="tx-time">14:32</div>
          </div>
          <span class="tx-amount minus">-&#8361;5,500</span>
        </div>
      </div>

      <!-- 2026.04.15 -->
      <div class="date-group">
        <div class="date-header">2026.04.15</div>

        <!-- ATM -->
        <div class="tx-row">
          <div class="tx-icon withdraw">
            <span data-icon="creditCard" style="width:20px;height:20px;display:inline-flex;color:currentColor"></span>
          </div>
          <div class="tx-info">
            <div class="tx-name">ATM 출금</div>
            <div class="tx-time">11:05</div>
          </div>
          <span class="tx-amount minus">-&#8361;30,000</span>
        </div>

        <!-- Another charge -->
        <div class="tx-row">
          <div class="tx-icon charge">
            <span data-icon="arrowUp" style="width:20px;height:20px;display:inline-flex;color:currentColor"></span>
          </div>
          <div class="tx-info">
            <div class="tx-name">신한은행 충전</div>
            <div class="tx-time">09:14</div>
          </div>
          <span class="tx-amount plus">+&#8361;100,000</span>
        </div>
      </div>

      <!-- 2026.04.14 -->
      <div class="date-group">
        <div class="date-header">2026.04.14</div>

        <!-- Payment -->
        <div class="tx-row">
          <div class="tx-icon pay">
            <span data-icon="shoppingBag" style="width:20px;height:20px;display:inline-flex;color:currentColor"></span>
          </div>
          <div class="tx-info">
            <div class="tx-name">GS25 결제</div>
            <div class="tx-time">20:48</div>
          </div>
          <span class="tx-amount minus">-&#8361;3,200</span>
        </div>
      </div>
    </div>

    <!-- Empty State (visible when no transactions) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-illustration">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--color-gray-400)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="empty-title">거래 내역이 없습니다</div>
      <div class="empty-desc">선택한 기간에 거래 내역이 없어요.<br>다른 기간이나 필터를 선택해보세요.</div>
    </div>

  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
