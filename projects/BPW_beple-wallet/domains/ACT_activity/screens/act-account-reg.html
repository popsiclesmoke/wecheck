<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>계좌 등록</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: var(--text-font-family);
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* TopBar */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--color-border-card);
      flex-shrink: 0;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-heading);
    }
    .topbar-title {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
    }

    /* Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Section */
    .section {}
    .section-label {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-title);
      margin-bottom: 12px;
    }

    /* Bank grid */
    .bank-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .bank-pill {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--color-bg-content-2);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-md);
      font-size: var(--text-body-sm-size);
      font-weight: 400;
      color: var(--color-text-body);
      cursor: pointer;
      transition: none;
    }
    .bank-pill.selected {
      background: var(--color-blue-100);
      border-color: var(--color-primary);
      color: var(--color-primary);
      font-weight: 600;
    }
    .bank-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-shinhan  { background: var(--color-blue-500); }
    .dot-kb       { background: var(--color-yellow-500); }
    .dot-woori    { background: var(--color-mint-500); }
    .dot-hana     { background: var(--color-blue-400); }
    .dot-nonghyup { background: var(--color-blue-300); }
    .dot-ibk      { background: var(--color-mint-200); }

    /* Text field */
    .input-wrap {
      position: relative;
    }
    .input-label {
      font-size: var(--input-label-font-size);
      color: var(--color-text-description);
      margin-bottom: 6px;
      display: block;
    }
    .text-input {
      width: 100%;
      height: var(--input-height);
      border: var(--input-border-box) solid var(--color-border-input);
      border-radius: var(--input-radius);
      padding: 0 14px;
      font-size: var(--input-placeholder-size-box);
      font-family: var(--text-font-family);
      color: var(--color-text-heading);
      background: var(--color-bg);
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus {
      border-color: var(--color-primary);
    }
    .text-input.error {
      border-color: var(--color-error);
    }
    .text-input::placeholder {
      color: var(--color-text-disabled);
    }

    /* Field error message */
    .field-error {
      font-size: var(--text-body-xs-size);
      color: var(--color-error);
      min-height: 16px;
      margin-top: 6px;
      line-height: 1.4;
    }

    /* ARS card */
    .ars-card {
      background: var(--color-bg-content-2);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .ars-card-title {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 10px;
    }
    .ars-phone-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--color-bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border-card);
      margin-bottom: 10px;
    }
    .ars-phone-icon {
      width: 36px;
      height: 36px;
      background: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-white);
      flex-shrink: 0;
    }
    .ars-phone-number {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
    }
    .ars-desc {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      padding: 16px;
      flex-shrink: 0;
    }
    .btn-primary {
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius-xl);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:disabled {
      background: var(--color-gray-500);
      color: var(--color-white);
      cursor: not-allowed;
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" aria-label="뒤로가기">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex;color:currentColor"></span>
    </button>
    <span class="topbar-title">계좌 등록</span>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- 1. 은행 선택 -->
    <div class="section">
      <div class="section-label">1. 은행 선택</div>
      <div class="bank-grid">
        <button class="bank-pill selected">
          <span class="bank-dot dot-shinhan"></span>신한은행
        </button>
        <button class="bank-pill">
          <span class="bank-dot dot-kb"></span>국민은행
        </button>
        <button class="bank-pill">
          <span class="bank-dot dot-woori"></span>우리은행
        </button>
        <button class="bank-pill">
          <span class="bank-dot dot-hana"></span>하나은행
        </button>
        <button class="bank-pill">
          <span class="bank-dot dot-nonghyup"></span>농협은행
        </button>
        <button class="bank-pill">
          <span class="bank-dot dot-ibk"></span>기업은행
        </button>
      </div>
    </div>

    <!-- 2. 계좌번호 -->
    <div class="section">
      <div class="section-label">2. 계좌번호 입력</div>
      <label class="input-label" for="account-number">계좌번호 (- 없이 숫자만)</label>
      <input
        id="account-number"
        class="text-input"
        type="text"
        inputmode="numeric"
        placeholder="예) 11012312345"
        maxlength="20"
      />
      <div class="field-error" id="accountError"></div>
    </div>

    <!-- 3. ARS 인증 -->
    <div class="section">
      <div class="section-label">3. ARS 인증</div>
      <div class="ars-card">
        <div class="ars-card-title">아래 번호로 전화가 옵니다</div>
        <div class="ars-phone-wrap">
          <div class="ars-phone-icon">
            <span data-icon="phone" style="width:18px;height:18px;display:inline-flex;color:currentColor"></span>
          </div>
          <span class="ars-phone-number">010-5123-****</span>
        </div>
        <div class="ars-desc">
          등록된 휴대폰 번호로 ARS 인증 전화가 발신됩니다.<br>
          수신 후 안내에 따라 진행해주세요.
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary" id="registerBtn" disabled>등록하기</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    (function() {
      var input = document.getElementById('account-number');
      var errorEl = document.getElementById('accountError');
      var registerBtn = document.getElementById('registerBtn');

      function validate() {
        var value = input.value;

        /* Check for non-numeric characters */
        if (value.length > 0 && /[^0-9]/.test(value)) {
          errorEl.textContent = '계좌번호는 숫자만 입력해주세요';
          input.classList.add('error');
          registerBtn.disabled = true;
          return;
        }

        /* Check minimum length */
        if (value.length < 7) {
          errorEl.textContent = '';
          input.classList.remove('error');
          registerBtn.disabled = true;
          return;
        }

        /* All valid */
        errorEl.textContent = '';
        input.classList.remove('error');
        registerBtn.disabled = false;
      }

      input.addEventListener('input', validate);

      /* Initial state */
      validate();
    })();
  </script>
</body>
</html>
