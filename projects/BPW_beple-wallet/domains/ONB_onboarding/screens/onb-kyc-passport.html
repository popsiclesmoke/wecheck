<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-008 여권 OCR</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-gray-900);
      color: var(--color-bg);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px;
      background: transparent;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-bg); }

    /* TopBar */
    .topbar {
      height: 56px; background: transparent;
      display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .back-btn {
      width: 40px; height: 40px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-bg); border-radius: var(--radius-md); margin-left: -8px;
    }
    .back-btn:hover { background: color-mix(in srgb, var(--color-white) 10%, transparent); }

    /* Title area */
    .title-area {
      padding: 0 20px 20px;
      flex-shrink: 0;
    }
    .page-title {
      font-size: var(--text-title-lg-size);
      font-weight: var(--text-title-lg-weight);
      color: var(--color-bg);
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: var(--text-body-sm-size);
      color: color-mix(in srgb, var(--color-white) 60%, transparent);
      line-height: 1.5;
    }

    /* Camera viewfinder */
    .viewfinder-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      position: relative;
    }

    /* Dark overlay with cutout */
    .viewfinder-outer {
      width: 100%;
      position: relative;
    }

    .passport-frame {
      width: 100%;
      aspect-ratio: 1.42 / 1;
      border-radius: var(--radius-xl);
      position: relative;
      background: color-mix(in srgb, var(--color-white) 4%, transparent);
      overflow: visible;
    }

    /* Corner guides */
    .corner {
      position: absolute;
      width: 24px; height: 24px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--color-primary);
      border-radius: 2px;
    }
    .corner-tl { top: 0; left: 0; }
    .corner-tl::before { top: 0; left: 0; width: 3px; height: 24px; }
    .corner-tl::after  { top: 0; left: 0; width: 24px; height: 3px; }

    .corner-tr { top: 0; right: 0; }
    .corner-tr::before { top: 0; right: 0; width: 3px; height: 24px; }
    .corner-tr::after  { top: 0; right: 0; width: 24px; height: 3px; }

    .corner-bl { bottom: 0; left: 0; }
    .corner-bl::before { bottom: 0; left: 0; width: 3px; height: 24px; }
    .corner-bl::after  { bottom: 0; left: 0; width: 24px; height: 3px; }

    .corner-br { bottom: 0; right: 0; }
    .corner-br::before { bottom: 0; right: 0; width: 3px; height: 24px; }
    .corner-br::after  { bottom: 0; right: 0; width: 24px; height: 3px; }

    /* Passport content mockup inside frame */
    .passport-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .passport-photo-placeholder {
      width: 56px; height: 70px;
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--color-white) 12%, transparent);
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    .passport-lines {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 55%;
    }
    .p-line {
      height: 8px;
      border-radius: 4px;
      background: color-mix(in srgb, var(--color-white) 15%, transparent);
    }
    .p-line.short { width: 60%; }

    /* MRZ lines at bottom */
    .mrz-lines {
      position: absolute;
      bottom: 14px;
      left: 14px; right: 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .mrz-line {
      height: 6px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--color-white) 10%, transparent);
      font-size: 8px;
      letter-spacing: 1px;
      color: color-mix(in srgb, var(--color-white) 30%, transparent);
      display: flex;
      align-items: center;
      padding: 0 4px;
    }

    /* Scan animation line */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
      animation: scanMove 2.5s ease-in-out infinite;
      top: 20%;
    }
    @keyframes scanMove {
      0%, 100% { top: 10%; opacity: 0.4; }
      50% { top: 85%; opacity: 1; }
    }

    /* Guide text */
    .guide-text {
      margin-top: 20px;
      text-align: center;
    }
    .guide-main {
      font-size: var(--text-body-lg-size);
      color: var(--color-bg);
      font-weight: 500;
      margin-bottom: 6px;
    }
    .guide-sub {
      font-size: var(--text-body-sm-size);
      color: color-mix(in srgb, var(--color-white) 50%, transparent);
      line-height: 1.5;
    }

    /* Tips */
    .tips {
      padding: 14px 16px;
      margin: 0 20px;
      background: color-mix(in srgb, var(--color-white) 7%, transparent);
      border-radius: var(--radius-lg);
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-shrink: 0;
      margin-bottom: 16px;
    }
    .tips-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .tips-text {
      font-size: var(--text-body-xs-size);
      color: color-mix(in srgb, var(--color-white) 55%, transparent);
      line-height: 1.6;
    }

    /* Bottom button */
    .btn-area { padding: 0 20px 32px; flex-shrink: 0; }
    .btn-primary {
      display: block; width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-bg); border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer; letter-spacing: -0.2px;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
  </div>

  <!-- Title -->
  <div class="title-area">
    <div class="page-title">여권을 촬영해주세요</div>
    <div class="page-subtitle">여권 사진면이 가이드 안에 들어오도록 맞춰주세요</div>
  </div>

  <!-- Viewfinder -->
  <div class="viewfinder-wrap">
    <div class="viewfinder-outer">
      <div class="passport-frame">
        <!-- Corners -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- Passport mockup -->
        <div class="passport-photo-placeholder"></div>
        <div class="passport-lines">
          <div class="p-line"></div>
          <div class="p-line short"></div>
          <div class="p-line"></div>
          <div class="p-line short"></div>
        </div>

        <!-- MRZ -->
        <div class="mrz-lines">
          <div class="mrz-line">P&lt;KORHONG&lt;&lt;GIL&lt;DONG&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</div>
          <div class="mrz-line">M12345678&lt;6KOR8501014M2801013&lt;&lt;&lt;&lt;</div>
        </div>

        <!-- Scan animation -->
        <div class="scan-line"></div>
      </div>
    </div>

    <!-- Guide text -->
    <div class="guide-text">
      <div class="guide-main">여권 사진면이 잘 보이도록 놓아주세요</div>
      <div class="guide-sub">빛 반사가 없는 곳에서 촬영해주세요</div>
    </div>
  </div>

  <!-- Tips -->
  <div class="tips">
    <span class="tips-icon">&#x1F4A1;</span>
    <span class="tips-text">여권의 사진, 이름, 번호 등 모든 정보가 선명하게 보여야 합니다. 빛 반사나 그림자가 없는 밝은 환경에서 촬영해주세요.</span>
  </div>

  <!-- Button: 촬영하기 -> 여권 정보 확인 페이지로 이동 -->
  <div class="btn-area">
    <button class="btn-primary" onclick="location.href='onb-kyc-passport-confirm.html'">촬영하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
