<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-010 KYC 완료</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* Steps indicator */
    .steps-bar {
      padding: 12px 20px;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .step-bar-item {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--color-border-divider);
    }
    .step-bar-item.done { background: var(--color-primary); }

    /* Centered content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      text-align: center;
    }

    /* Complete icon with rings */
    .icon-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--state-gap-icon-msg);
    }
    .ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--color-blue-50);
    }
    .ring-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--color-blue-100);
    }
    .complete-icon {
      width: var(--state-icon-size);
      height: var(--state-icon-size);
      border-radius: 50%;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .msg-block {
      display: flex;
      flex-direction: column;
      gap: var(--state-gap-msg-desc);
      margin-bottom: var(--state-gap-desc-btn);
    }
    .headline {
      font-size: var(--text-headline-size);
      font-weight: var(--text-headline-weight);
      color: var(--color-text-heading);
      line-height: 1.3;
    }
    .body-text {
      font-size: var(--text-body-lg-size);
      color: var(--color-text-body);
      line-height: 1.6;
    }

    /* Info card */
    .info-card {
      width: 100%;
      background: var(--color-blue-50);
      border: 1px solid var(--color-blue-200);
      border-radius: var(--radius-xl);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .info-card-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: var(--color-blue-100);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .info-card-text { text-align: left; }
    .info-card-title {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-primary);
      margin-bottom: 2px;
    }
    .info-card-desc {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-body);
    }

    /* Bottom button */
    .btn-area { padding: 0 20px 40px; flex-shrink: 0; }
    .btn-primary {
      display: block; width: 100%;
      height: var(--btn-xl-height); background: var(--color-primary);
      color: var(--color-bg); border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer; letter-spacing: -0.2px;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- Steps bar -->
  <div class="steps-bar">
    <div class="step-bar-item done"></div>
    <div class="step-bar-item done"></div>
    <div class="step-bar-item done"></div>
    <div class="step-bar-item done"></div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Icon -->
    <div class="icon-wrap">
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="complete-icon">
        <span data-icon="checkMd" style="width:32px;height:32px;display:inline-flex;color:var(--color-bg)"></span>
      </div>
    </div>

    <!-- Message -->
    <div class="msg-block">
      <div class="headline">인증이 완료됐습니다</div>
      <div class="body-text">충전 한도 50만원으로 서비스를<br>이용하실 수 있습니다</div>
    </div>

    <!-- Info card -->
    <div class="info-card">
      <div class="info-card-icon">💳</div>
      <div class="info-card-text">
        <div class="info-card-title">Quick KYC 인증 완료</div>
        <div class="info-card-desc">월 최대 50만원 충전 · 비플월렛 결제 서비스 이용 가능</div>
      </div>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-area">
    <button class="btn-primary" onclick="location.href='onb-pin-setup.html'">PIN 설정하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
