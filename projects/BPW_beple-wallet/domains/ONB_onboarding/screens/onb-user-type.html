<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-002 사용자 유형 선택</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
      position: relative;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-heading);
      border-radius: var(--radius-md);
      margin-left: -8px;
    }
    .back-btn:hover { background: var(--color-bg-content-1); }

    /* Content */
    .content {
      flex: 1;
      padding: 8px 20px 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Page title */
    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: var(--text-body-lg-size);
      color: var(--color-text-description);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Type cards */
    .type-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .type-card {
      border: 2px solid var(--color-border-card);
      border-radius: var(--radius-2xl);
      padding: 24px 20px;
      cursor: pointer;
      background: var(--color-bg);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .type-card:hover {
      border-color: var(--color-blue-400);
      background: var(--color-blue-50);
    }
    .type-card.selected {
      border-color: var(--color-primary);
      background: var(--color-blue-50);
      box-shadow: var(--shadow-card);
    }
    .type-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-lg);
      background: var(--color-bg-content-1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .type-card.selected .type-icon {
      background: var(--color-blue-100);
    }
    .type-info {
      flex: 1;
    }
    .type-name {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }
    .type-desc {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      line-height: 1.4;
    }
    .type-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .type-card.selected .type-check {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .check-icon {
      display: none;
    }
    .type-card.selected .check-icon {
      display: inline-flex;
    }

    /* Bottom button */
    .btn-area {
      padding: 16px 20px 32px;
      flex-shrink: 0;
    }
    .btn-primary {
      display: block;
      width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-bg);
      border: none;
      border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.2px;
    }
    .btn-primary:disabled {
      background: var(--color-gray-400);
      color: var(--color-bg);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-title">어떤 사용자이신가요?</div>
    <div class="page-subtitle">회원 유형에 따라 가입 절차가 달라집니다</div>

    <div class="type-cards">
      <!-- 내국인 -->
      <div class="type-card selected" id="card-domestic" onclick="selectType('domestic')">
        <div class="type-icon">&#x1F1F0;&#x1F1F7;</div>
        <div class="type-info">
          <div class="type-name">내국인</div>
          <div class="type-desc">대한민국 국적자<br>SMS 본인인증으로 간편 가입</div>
        </div>
        <div class="type-check">
          <span class="check-icon" data-icon="checkOption" style="width:14px;height:14px;display:inline-flex;color:var(--color-bg)"></span>
        </div>
      </div>

      <!-- 외국인 -->
      <div class="type-card" id="card-foreign" onclick="selectType('foreign')">
        <div class="type-icon">&#x1F30F;</div>
        <div class="type-info">
          <div class="type-name">외국인</div>
          <div class="type-desc">외국 국적자<br>여권 + 안면인식 KYC 인증 필요</div>
        </div>
        <div class="type-check">
          <span class="check-icon" data-icon="checkOption" style="width:14px;height:14px;display:inline-flex;color:var(--color-bg)"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-area">
    <button class="btn-primary" id="nextBtn" onclick="goNext()">다음</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    var selected = 'domestic';

    function selectType(type) {
      selected = type;
      document.getElementById('card-domestic').classList.toggle('selected', type === 'domestic');
      document.getElementById('card-foreign').classList.toggle('selected', type === 'foreign');
      document.getElementById('nextBtn').disabled = false;
    }

    function goNext() {
      /* 사용자 유형을 sessionStorage에 저장하고 약관 동의 페이지로 이동 */
      sessionStorage.setItem('userType', selected);
      location.href = 'onb-terms.html';
    }
  </script>
</body>
</html>
