<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-007 KYC 방법 선택</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px; background: var(--color-bg);
      display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .back-btn {
      width: 40px; height: 40px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-heading); border-radius: var(--radius-md); margin-left: -8px;
    }
    .back-btn:hover { background: var(--color-bg-content-1); }

    /* Content */
    .content {
      flex: 1; padding: 8px 20px 0;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* Method cards */
    .method-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .method-card {
      border: 2px solid var(--color-border-card);
      border-radius: var(--radius-2xl);
      padding: 22px 20px;
      cursor: pointer;
      background: var(--color-bg);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .method-card.active {
      border-color: var(--color-primary);
      background: var(--color-blue-50);
      box-shadow: var(--shadow-card);
    }
    .method-card.disabled-card {
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Active card gradient top bar */
    .method-card.active::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gradient-blue);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .card-icon-wrap {
      width: 44px; height: 44px;
      border-radius: var(--radius-lg);
      background: var(--color-bg-content-1);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      transition: background 0.15s;
    }
    .method-card.active .card-icon-wrap {
      background: var(--color-blue-100);
    }
    .card-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active {
      background: var(--color-primary);
      color: var(--color-bg);
    }
    .badge-soon {
      background: var(--color-bg-content-1);
      color: var(--color-text-description);
    }
    .card-select {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .method-card.active .card-select {
      border-color: var(--color-primary);
      background: var(--color-primary);
    }
    .check-svg { display: none; }
    .method-card.active .check-svg { display: inline-flex; }

    .card-name {
      font-size: var(--text-title-md-size);
      font-weight: var(--text-title-md-weight);
      color: var(--color-text-heading);
      margin-bottom: 4px;
    }
    .card-limit {
      font-size: var(--text-body-sm-size);
      color: var(--color-primary);
      font-weight: 500;
      margin-bottom: 12px;
    }
    .method-card.disabled-card .card-limit {
      color: var(--color-text-disabled);
    }

    .card-steps {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .step-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border-card);
      border-radius: 20px;
      font-size: var(--text-body-xs-size);
      color: var(--color-text-body);
    }
    .method-card.active .step-pill {
      background: var(--color-blue-100);
      border-color: var(--color-blue-200);
      color: var(--color-primary);
    }
    .step-num {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--color-primary);
      color: var(--color-bg);
      font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .method-card.disabled-card .step-num {
      background: var(--color-text-disabled);
    }

    /* Bottom button */
    .btn-area { padding: 16px 20px 32px; flex-shrink: 0; }
    .btn-primary {
      display: block; width: 100%;
      height: var(--btn-xl-height); background: var(--color-primary);
      color: var(--color-bg); border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer; letter-spacing: -0.2px;
    }
    .btn-primary:disabled { background: var(--color-gray-400); cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-title">본인인증 방식을<br>선택해주세요</div>
    <div class="page-subtitle">선택한 방식에 따라 서비스 이용 한도가 달라집니다</div>

    <div class="method-cards">
      <!-- Quick KYC -->
      <div class="method-card active" id="card-quick" onclick="selectMethod('quick')">
        <div class="card-header">
          <div class="card-icon-wrap">🚀</div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="card-badge badge-active">추천</span>
            <div class="card-select">
              <span class="check-svg" data-icon="checkSm" style="width:12px;height:12px;display:inline-flex;color:var(--color-bg)"></span>
            </div>
          </div>
        </div>
        <div class="card-name">Quick 인증</div>
        <div class="card-limit">충전 한도 50만원</div>
        <div class="card-steps">
          <div class="step-pill"><span class="step-num">1</span>여권 촬영</div>
          <div class="step-pill"><span class="step-num">2</span>안면 인식</div>
          <div class="step-pill"><span class="step-num">3</span>HiKorea 조회</div>
        </div>
      </div>

      <!-- Full KYC -->
      <div class="method-card disabled-card" id="card-full">
        <div class="card-header">
          <div class="card-icon-wrap">⭐</div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="card-badge badge-soon">준비 중</span>
            <div class="card-select">
              <span class="check-svg" data-icon="checkSm" style="width:12px;height:12px;display:inline-flex;color:var(--color-bg)"></span>
            </div>
          </div>
        </div>
        <div class="card-name">Full 인증</div>
        <div class="card-limit">한도 상향 (서비스 준비 중)</div>
        <div class="card-steps">
          <div class="step-pill"><span class="step-num">1</span>여권 촬영</div>
          <div class="step-pill"><span class="step-num">2</span>안면 인식</div>
          <div class="step-pill"><span class="step-num">3</span>추가 서류</div>
          <div class="step-pill"><span class="step-num">4</span>심사</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-area">
    <button class="btn-primary" onclick="location.href='onb-kyc-passport.html'">다음</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    function selectMethod(type) {
      if (type === 'full') return; // disabled
      document.getElementById('card-quick').classList.toggle('active', type === 'quick');
    }
  </script>
</body>
</html>
