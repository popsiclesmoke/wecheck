<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-014 여권 정보 확인</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px; background: var(--color-bg);
      display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
      position: relative;
    }
    .back-btn {
      width: 40px; height: 40px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-heading); border-radius: var(--radius-md); margin-left: -8px;
    }
    .back-btn:hover { background: var(--color-bg-content-1); }
    .topbar-title {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
    }

    /* Content */
    .content {
      flex: 1;
      padding: 16px 20px 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Passport thumbnail */
    .passport-thumbnail {
      width: 100%;
      aspect-ratio: 1.42 / 1;
      background: var(--color-bg-content-1);
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      overflow: hidden;
      position: relative;
    }
    .passport-thumbnail-icon {
      width: 48px; height: 48px;
      color: var(--color-text-disabled);
      display: flex; align-items: center; justify-content: center;
    }
    .passport-thumbnail-text {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-disabled);
    }

    /* Passport mockup inside thumbnail */
    .thumb-mockup {
      position: absolute;
      inset: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      opacity: 0.35;
    }
    .thumb-photo {
      width: 40px; height: 50px;
      border-radius: var(--radius-md);
      background: var(--color-border-divider);
      position: absolute;
      left: 12px; top: 50%; transform: translateY(-50%);
    }
    .thumb-lines {
      position: absolute;
      right: 12px; top: 50%; transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 50%;
    }
    .thumb-line {
      height: 6px; border-radius: 3px;
      background: var(--color-border-divider);
    }
    .thumb-line.short { width: 60%; }
    .thumb-mrz {
      position: absolute;
      bottom: 8px; left: 8px; right: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .thumb-mrz-line {
      height: 4px; border-radius: 2px;
      background: var(--color-border-divider);
    }

    /* Info card */
    .info-card {
      background: var(--color-bg);
      border: 1px solid var(--color-border-card);
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }
    .info-card-title {
      font-size: var(--text-title-xs-size);
      font-weight: var(--text-title-xs-weight);
      color: var(--color-text-heading);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-card-title-icon {
      width: 16px; height: 16px;
      color: var(--color-primary);
      display: inline-flex;
    }
    .info-row {
      display: flex;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--color-bg-content-1);
    }
    .info-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .info-label {
      width: 80px;
      flex-shrink: 0;
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
    }
    .info-value {
      flex: 1;
      min-width: 0;
      font-size: var(--text-body-sm-size);
      font-weight: 500;
      color: var(--color-text-heading);
    }

    /* Guide text */
    .guide-info {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 12px 16px;
      background: var(--color-blue-50);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }
    .guide-info-icon {
      color: var(--color-primary);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .guide-info-text {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-body);
      line-height: 1.5;
    }

    /* Bottom buttons */
    .btn-area {
      padding: 16px 20px 32px;
      flex-shrink: 0;
      display: flex;
      gap: 8px;
    }
    .btn-secondary {
      flex: 1;
      height: var(--btn-xl-height);
      background: var(--color-bg);
      color: var(--color-text-title);
      border: 1.5px solid var(--color-border-divider);
      border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.2px;
    }
    .btn-secondary:hover {
      background: var(--color-bg-content-2);
    }
    .btn-primary {
      flex: 1;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-bg);
      border: none;
      border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.2px;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">여권 정보 확인</span>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Passport thumbnail (gray placeholder with mockup) -->
    <div class="passport-thumbnail">
      <div class="thumb-mockup">
        <div class="thumb-photo"></div>
        <div class="thumb-lines">
          <div class="thumb-line"></div>
          <div class="thumb-line short"></div>
          <div class="thumb-line"></div>
          <div class="thumb-line short"></div>
        </div>
        <div class="thumb-mrz">
          <div class="thumb-mrz-line"></div>
          <div class="thumb-mrz-line"></div>
        </div>
      </div>
      <div class="passport-thumbnail-icon" data-icon="fileText"></div>
      <div class="passport-thumbnail-text">촬영된 여권 이미지</div>
    </div>

    <!-- Info card -->
    <div class="info-card">
      <div class="info-card-title">
        <span class="info-card-title-icon" data-icon="infoCircle"></span>
        OCR 인식 결과
      </div>
      <div class="info-row">
        <span class="info-label">영문 이름</span>
        <span class="info-value">HONG GILDONG</span>
      </div>
      <div class="info-row">
        <span class="info-label">여권 번호</span>
        <span class="info-value">M12345678</span>
      </div>
      <div class="info-row">
        <span class="info-label">생년월일</span>
        <span class="info-value">1985-01-01</span>
      </div>
      <div class="info-row">
        <span class="info-label">국적</span>
        <span class="info-value">USA</span>
      </div>
      <div class="info-row">
        <span class="info-label">만료일</span>
        <span class="info-value">2028-01-01</span>
      </div>
    </div>

    <!-- Guide info -->
    <div class="guide-info">
      <span class="guide-info-icon" data-icon="infoCircle" style="width:14px;height:14px;display:inline-flex"></span>
      <span class="guide-info-text">정보가 정확한지 확인해주세요. 오류가 있으면 다시 촬영해주세요.</span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-area">
    <button class="btn-secondary" onclick="location.href='onb-kyc-passport.html'">다시 촬영</button>
    <button class="btn-primary" onclick="location.href='onb-kyc-face.html'">확인</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
