<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-012 PIN 확인</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px; flex-shrink: 0; position: relative;
    }
    .back-btn {
      position: absolute; left: 8px;
      width: 40px; height: 40px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-heading); border-radius: var(--radius-md);
    }
    .back-btn:hover { background: var(--color-bg-content-1); }
    .topbar-title {
      font-size: var(--text-title-sm-size);
      font-weight: var(--text-title-sm-weight);
      color: var(--color-text-heading);
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 0;
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      text-align: center;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      text-align: center;
      margin-bottom: 40px;
    }

    /* PIN dots */
    .pin-dots {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--color-border-divider);
      background: transparent;
      transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dot.filled {
      border-color: var(--color-primary);
      background: var(--color-primary);
      transform: scale(1.1);
    }
    .dot.error-dot {
      border-color: var(--color-error);
      background: var(--color-error);
    }

    .pin-hint {
      font-size: var(--text-body-xs-size);
      color: var(--color-text-description);
      margin-bottom: 40px;
      height: 18px;
      text-align: center;
    }
    .pin-hint.error-hint {
      color: var(--color-error);
    }

    /* Error shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    .pin-dots.shake { animation: shake 0.4s ease; }

    /* Keypad */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      width: 100%;
      max-width: 320px;
    }
    .key-btn {
      height: 72px; background: none; border: none;
      font-family: inherit; font-size: var(--text-title-lg-size); font-weight: 400;
      color: var(--color-text-heading); cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: var(--radius-lg); transition: background 0.1s; gap: 2px;
    }
    .key-btn:hover { background: var(--color-bg-content-1); }
    .key-btn:active { background: var(--color-bg-content-1); transform: scale(0.95); }
    .key-btn.empty { cursor: default; pointer-events: none; }
    .key-btn.del { font-size: 22px; color: var(--color-text-body); }
    .key-sub {
      font-size: 8px; letter-spacing: 1px;
      color: var(--color-text-disabled); font-weight: 400; line-height: 1;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
    <span class="topbar-title">PIN 확인</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-title">PIN을 한 번 더<br>입력해주세요</div>
    <div class="page-subtitle">앞서 입력한 PIN을 다시 입력해 주세요</div>

    <!-- PIN dots -->
    <div class="pin-dots" id="pinDots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <div class="pin-hint" id="pinHint"></div>

    <!-- Keypad -->
    <div class="keypad">
      <button class="key-btn" onclick="pressKey('1')">1<span class="key-sub"></span></button>
      <button class="key-btn" onclick="pressKey('2')">2<span class="key-sub">ABC</span></button>
      <button class="key-btn" onclick="pressKey('3')">3<span class="key-sub">DEF</span></button>
      <button class="key-btn" onclick="pressKey('4')">4<span class="key-sub">GHI</span></button>
      <button class="key-btn" onclick="pressKey('5')">5<span class="key-sub">JKL</span></button>
      <button class="key-btn" onclick="pressKey('6')">6<span class="key-sub">MNO</span></button>
      <button class="key-btn" onclick="pressKey('7')">7<span class="key-sub">PQRS</span></button>
      <button class="key-btn" onclick="pressKey('8')">8<span class="key-sub">TUV</span></button>
      <button class="key-btn" onclick="pressKey('9')">9<span class="key-sub">WXYZ</span></button>
      <button class="key-btn empty"></button>
      <button class="key-btn" onclick="pressKey('0')">0</button>
      <button class="key-btn del" onclick="deleteKey()">
        <span data-icon="arrowBackFilled" style="width:24px;height:24px;display:inline-flex"></span>
      </button>
    </div>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    let pin = '';
    const MAX = 6;
    const setupPin = sessionStorage.getItem('setupPin') || '000000';

    function pressKey(key) {
      if (pin.length >= MAX) return;
      /* Clear error state as soon as user starts typing */
      var hint = document.getElementById('pinHint');
      if (hint.classList.contains('error-hint')) {
        hint.textContent = '';
        hint.classList.remove('error-hint');
        document.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('error-dot'); });
      }
      pin += key;
      updateDots();
      if (pin.length === MAX) {
        setTimeout(verify, 200);
      }
    }

    function deleteKey() {
      if (pin.length === 0) return;
      pin = pin.slice(0, -1);
      var hint = document.getElementById('pinHint');
      hint.textContent = '';
      hint.classList.remove('error-hint');
      document.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('error-dot'); });
      updateDots();
    }

    function updateDots() {
      var dots = document.querySelectorAll('.dot');
      dots.forEach(function(dot, i) {
        dot.classList.toggle('filled', i < pin.length);
      });
    }

    function verify() {
      if (pin === setupPin) {
        location.href = 'onb-bio.html';
      } else {
        // Show error
        var dots = document.querySelectorAll('.dot');
        dots.forEach(function(d) { d.classList.remove('filled'); d.classList.add('error-dot'); });
        var dotsEl = document.getElementById('pinDots');
        var hint = document.getElementById('pinHint');
        hint.textContent = 'PIN이 일치하지 않습니다. 다시 입력해주세요.';
        hint.classList.add('error-hint');
        dotsEl.classList.add('shake');
        setTimeout(function() {
          dotsEl.classList.remove('shake');
          dots.forEach(function(d) { d.classList.remove('error-dot'); });
          pin = '';
        }, 600);
      }
    }
  </script>
</body>
</html>
