<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-006 외국인 연락처 인증</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* TopBar */
    .topbar {
      height: 56px; background: var(--color-bg);
      display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .back-btn {
      width: 40px; height: 40px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-heading); border-radius: var(--radius-md); margin-left: -8px;
    }
    .back-btn:hover { background: var(--color-bg-content-1); }

    /* Content */
    .content {
      flex: 1; padding: 8px 20px 0;
      display: flex; flex-direction: column; overflow: hidden;
    }

    .page-title {
      font-size: var(--text-title-xl-size);
      font-weight: var(--text-title-xl-weight);
      color: var(--color-text-heading);
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .page-subtitle {
      font-size: var(--text-body-sm-size);
      color: var(--color-text-description);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Tabs */
    .tab-row {
      display: flex;
      border-bottom: 2px solid var(--color-border-divider);
      margin-bottom: 28px;
    }
    .tab-item {
      flex: 1;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-body-lg-size);
      font-weight: 500;
      color: var(--color-text-description);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-item.active {
      color: var(--color-primary);
      font-weight: 600;
      border-bottom-color: var(--color-primary);
    }

    /* TextField line style */
    .field-group { margin-bottom: 28px; }
    .field-label {
      font-size: var(--input-label-font-size);
      font-weight: 500;
      color: var(--color-text-description);
      margin-bottom: 8px;
      display: block;
    }
    .field-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-bottom: var(--input-border-line) solid var(--color-border-divider);
      padding-bottom: 8px;
      max-width: 100%;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .field-row:focus-within { border-color: var(--color-primary); }
    .field-input {
      flex: 1; min-width: 0; border: none; outline: none; font-family: inherit;
      font-size: var(--input-placeholder-size-line);
      color: var(--color-text-heading); background: transparent;
    }
    .field-input::placeholder { color: var(--color-text-disabled); }
    .field-timer {
      font-size: var(--text-body-sm-size); font-weight: 500;
      color: var(--color-text-description); flex-shrink: 0;
      min-width: 38px; text-align: right;
    }
    .field-action-btn {
      flex-shrink: 0;
      height: var(--btn-sm-height);
      padding: 0 var(--btn-sm-padding-x);
      background: var(--color-primary); color: var(--color-bg);
      border: none; border-radius: var(--btn-sm-radius);
      font-size: var(--btn-sm-font-size); font-weight: 600;
      font-family: inherit; cursor: pointer; white-space: nowrap;
    }
    .field-action-btn:disabled {
      background: var(--color-gray-400); cursor: not-allowed;
    }

    .otp-group { display: none; }
    .otp-group.show { display: block; }

    /* Country code selector (for phone tab) */
    .country-select {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px 10px 0;
      border-bottom: var(--input-border-line) solid var(--color-border-divider);
      cursor: pointer;
      margin-bottom: 20px;
      transition: border-color 0.15s;
    }
    .country-select:focus-within { border-color: var(--color-primary); }
    .country-flag { font-size: 18px; }
    .country-code {
      font-size: var(--text-body-lg-size);
      font-weight: 500;
      color: var(--color-text-title);
    }
    .country-chevron { color: var(--color-text-description); }
    .country-select-wrapper { display: none; }
    .country-select-wrapper.show { display: block; }

    /* Bottom button */
    .btn-area { padding: 16px 20px 32px; flex-shrink: 0; }
    .btn-primary {
      display: block; width: 100%;
      height: var(--btn-xl-height); background: var(--color-primary);
      color: var(--color-bg); border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size); font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer; letter-spacing: -0.2px;
    }
    .btn-primary:disabled { background: var(--color-gray-400); cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- TopBar -->
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <span data-icon="arrowBack" style="width:24px;height:24px;display:inline-flex"></span>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="page-title">연락처를<br>인증해주세요</div>
    <div class="page-subtitle">이메일 또는 전화번호로 인증코드를 받으세요</div>

    <!-- Tabs -->
    <div class="tab-row">
      <div class="tab-item active" id="tab-email" onclick="switchTab('email')">이메일</div>
      <div class="tab-item" id="tab-phone" onclick="switchTab('phone')">전화번호</div>
    </div>

    <!-- Email panel -->
    <div id="panel-email">
      <div class="field-group">
        <label class="field-label">이메일 주소</label>
        <div class="field-row">
          <input class="field-input" type="email" id="emailInput"
            placeholder="example@email.com"
            oninput="onContactInput(this)">
          <button class="field-action-btn" id="sendBtnEmail" onclick="sendCode('email')" disabled>코드 발송</button>
        </div>
      </div>
      <div class="field-group otp-group" id="otpEmail">
        <label class="field-label">인증 코드</label>
        <div class="field-row">
          <input class="field-input" type="number" id="otpEmailInput"
            placeholder="6자리 인증 코드 입력"
            oninput="onOTPInput()">
          <span class="field-timer" id="timerEmail">3:00</span>
        </div>
      </div>
    </div>

    <!-- Phone panel -->
    <div id="panel-phone" style="display:none;">
      <div class="country-select" onclick="">
        <span class="country-flag">🌍</span>
        <span class="country-code">+1</span>
        <!-- Chevron down (custom viewBox 16x16, not matching icons.js — kept as inline SVG) -->
        <svg class="country-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="field-group">
        <label class="field-label">전화번호</label>
        <div class="field-row">
          <input class="field-input" type="tel" id="phoneInput"
            placeholder="전화번호 입력"
            oninput="onContactInput(this)">
          <button class="field-action-btn" id="sendBtnPhone" onclick="sendCode('phone')" disabled>코드 발송</button>
        </div>
      </div>
      <div class="field-group otp-group" id="otpPhone">
        <label class="field-label">인증 코드</label>
        <div class="field-row">
          <input class="field-input" type="number"
            placeholder="6자리 인증 코드 입력"
            oninput="onOTPInput()">
          <span class="field-timer" id="timerPhone">3:00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-area">
    <button class="btn-primary" id="mainBtn" onclick="onMainBtn()" disabled>인증번호 발송</button>
  </div>

  <script src="../../../icons.js"></script>
  <script>
    let currentTab = 'email';
    let otpSent = false;

    function switchTab(tab) {
      currentTab = tab;
      otpSent = false;
      document.getElementById('tab-email').classList.toggle('active', tab === 'email');
      document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
      document.getElementById('panel-email').style.display = tab === 'email' ? 'block' : 'none';
      document.getElementById('panel-phone').style.display = tab === 'phone' ? 'block' : 'none';
      document.getElementById('mainBtn').textContent = '인증번호 발송';
      document.getElementById('mainBtn').disabled = true;
    }

    function onContactInput(el) {
      const valid = el.value.trim().length > 3;
      const btnId = currentTab === 'email' ? 'sendBtnEmail' : 'sendBtnPhone';
      document.getElementById(btnId).disabled = !valid;
      if (!otpSent) document.getElementById('mainBtn').disabled = !valid;
    }

    function sendCode(type) {
      otpSent = true;
      const otpId = type === 'email' ? 'otpEmail' : 'otpPhone';
      document.getElementById(otpId).classList.add('show');
      document.getElementById('mainBtn').textContent = '인증하기';
      document.getElementById('mainBtn').disabled = true;
      startTimer(type === 'email' ? 'timerEmail' : 'timerPhone');
    }

    function startTimer(timerId) {
      let s = 180;
      const interval = setInterval(() => {
        s--;
        const m = Math.floor(s / 60);
        const sec = s % 60;
        document.getElementById(timerId).textContent = m + ':' + String(sec).padStart(2,'0');
        if (s <= 0) clearInterval(interval);
      }, 1000);
    }

    function onOTPInput() {
      document.getElementById('mainBtn').disabled = false;
    }

    function onMainBtn() {
      if (!otpSent) {
        sendCode(currentTab);
      } else {
        location.href = 'onb-terms.html';
      }
    }
  </script>
</body>
</html>
