<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>ONB-005 내국인 가입 완료</title>
  <link rel="stylesheet" href="../../../design/tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 360px; height: 800px; overflow: hidden; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg);
      color: var(--color-text-heading);
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    .status-bar {
      height: 24px; background: var(--color-bg);
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 16px; flex-shrink: 0;
    }
    .status-bar span { font-size: 11px; font-weight: 600; color: var(--color-text-heading); }

    /* Centered content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      text-align: center;
    }

    /* Complete icon with rings -- matching onb-kyc-complete.html */
    .icon-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--state-gap-icon-msg);
    }
    .ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--color-blue-50);
    }
    .ring-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--color-blue-100);
    }
    .complete-icon {
      width: var(--state-icon-size);
      height: var(--state-icon-size);
      border-radius: 50%;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* Confetti dots decoration */
    .confetti {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 4px;
    }
    .dot-dec {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .dot-dec:nth-child(1) { background: var(--color-primary); }
    .dot-dec:nth-child(2) { background: var(--color-mint-500); }
    .dot-dec:nth-child(3) { background: var(--color-yellow-500); }
    .dot-dec:nth-child(4) { background: var(--color-primary); }
    .dot-dec:nth-child(5) { background: var(--color-mint-200); }

    .msg-block {
      display: flex;
      flex-direction: column;
      gap: var(--state-gap-msg-desc);
    }
    .headline {
      font-size: var(--text-headline-size);
      font-weight: var(--text-headline-weight);
      color: var(--color-text-heading);
      line-height: 1.3;
    }
    .body-text {
      font-size: var(--text-body-lg-size);
      color: var(--color-text-body);
      line-height: 1.6;
    }

    /* Bottom button */
    .btn-area {
      padding: 0 20px 40px; flex-shrink: 0;
    }
    .btn-primary {
      display: block; width: 100%;
      height: var(--btn-xl-height);
      background: var(--color-primary);
      color: var(--color-bg);
      border: none; border-radius: var(--btn-xl-radius);
      font-size: var(--btn-xl-font-size);
      font-weight: var(--btn-xl-font-weight);
      font-family: inherit; cursor: pointer; letter-spacing: -0.2px;
    }
  </style>
</head>
<body>
  <!-- Status bar -->
  <div class="status-bar"><span>9:41</span></div>

  <!-- Centered content -->
  <div class="content">
    <!-- Complete icon -- primary background circle + white check (matching onb-kyc-complete) -->
    <div class="icon-wrap">
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="complete-icon">
        <span data-icon="checkMd" style="width:32px;height:32px;display:inline-flex;color:var(--color-bg)"></span>
      </div>
    </div>

    <!-- Confetti decoration -->
    <div class="confetti">
      <div class="dot-dec"></div>
      <div class="dot-dec"></div>
      <div class="dot-dec"></div>
      <div class="dot-dec"></div>
      <div class="dot-dec"></div>
    </div>

    <!-- Message -->
    <div class="msg-block">
      <div class="headline">회원가입이<br>완료됐습니다</div>
      <div class="body-text">지금 바로 PIN을 설정하고<br>비플월렛을 시작해보세요</div>
    </div>
  </div>

  <!-- Button -->
  <div class="btn-area">
    <button class="btn-primary" onclick="location.href='onb-pin-setup.html'">PIN 설정하기</button>
  </div>

  <script src="../../../icons.js"></script>
</body>
</html>
